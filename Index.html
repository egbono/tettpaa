<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TettPå">
<meta name="theme-color" content="#0e5b61">
<title>TettPå iPhone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --petrol:#0e5b61;--petrol-600:#0a4a4f;--petrol-050:#e7f1f1;
  --amber:#d98324;--mist:#eef2f0;--paper:#fff;--ink:#16201d;--muted:#8a938f;
  --line:#dde4e1;--line-soft:#f2f5f3;--red:#c0413b;--green:#2f8f5b;--blue:#2f6fb0;--blue-soft:#e6eefb;--muted-2:#b6c2be;--red-soft:#fbeaea;--green-soft:#e4f3ea;--amber-soft:#fbeed6;
  --font-d:'Bricolage Grotesque',Inter,sans-serif;

  --ks9cc4c4:#9cc4c4;
  --ksb6c8c4:#b6c8c4;
  --ksbfe3cd:#bfe3cd;
  --ksc3cecb:#c3cecb;
  --kse4f3ea:#e4f3ea;
  --ksf0d5d2:#f0d5d2;
  --ksf0dcae:#f0dcae;
  --ksf5fbfa:#f5fbfa;
  --ksf7faf9:#f7faf9;
  --ksfbeaea:#fbeaea;
  --ksfbeed6:#fbeed6;
  --ksfdf6e8:#fdf6e8;
  --ksfff:#fff;
  --kt1f7a4d:#1f7a4d;
  --kt46524e:#46524e;
  --kt5f6f6a:#5f6f6a;
  --kt9a6112:#9a6112;
  --kt9aa8a3:#9aa8a3;
  --ktb6c2be:#b6c2be;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:Inter,-apple-system,system-ui,sans-serif;background:var(--mist);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
.hdr{position:sticky;top:0;z-index:20;background:var(--petrol);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px}
.hdr .row{display:flex;align-items:center;gap:10px}
.hdr h1{font-family:var(--font-d);font-size:19px;font-weight:600;flex:1;margin:0}
.hdr .sub{font-size:11.5px;opacity:.8;margin-top:1px}
.iconbtn{background:rgba(255,255,255,.16);border:none;color:#fff;border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iconbtn svg{width:19px;height:19px}
.warnbar{background:var(--ksfbeed6);color:var(--kt9a6112);font-size:12px;padding:9px 14px;display:flex;gap:8px;align-items:flex-start;border-bottom:1px solid var(--ksf0dcae)}
.warnbar svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px}
.wrap{padding:12px 12px calc(env(safe-area-inset-bottom) + 96px)}
svg{stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:11px}
.tile{border:1px solid var(--line);background:var(--paper);border-radius:11px;padding:9px 5px;text-align:center;cursor:pointer}
.tile.on{background:var(--petrol);border-color:var(--petrol)}
.tile .n{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--petrol)}
.tile.on .n{color:#fff}
.tile .l{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;color:var(--muted);margin-top:1px}
.tile.on .l{color:rgba(255,255,255,.82)}
.bar{display:flex;gap:6px;align-items:center;border:1px solid var(--line);background:var(--paper);border-radius:11px;padding:8px;margin-bottom:11px;overflow-x:auto}
.chip{border:1px solid var(--line);background:var(--paper);border-radius:20px;padding:7px 13px;flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--kt46524e);white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.chip svg{width:14px;height:14px;flex:0 0 auto}
.chip.on{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.grp{font-family:var(--font-d);font-weight:600;font-size:12.5px;color:var(--muted);margin:14px 0 8px 2px;display:flex;align-items:center;gap:8px}
.abc{width:21px;height:21px;border-radius:6px;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700}
.card{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:12px;margin-bottom:9px;display:flex;gap:11px;align-items:flex-start}
.card.done{opacity:.55}
.chk{width:26px;height:26px;border:2px solid var(--ksc3cecb);border-radius:8px;flex:0 0 auto;background:var(--paper);cursor:pointer;position:relative;padding:0}
.chk.on{background:var(--green);border-color:var(--green)}
.chk.on::after{content:'';position:absolute;left:8px;top:3.5px;width:5px;height:12px;border:solid var(--ksfff);border-width:0 2.5px 2.5px 0;transform:rotate(45deg)}
.body{flex:1;min-width:0}
.top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.t{font-weight:600;font-size:15px}
.card.done .t{text-decoration:line-through;color:var(--muted)}
.tg{border-radius:20px;font-size:9.5px;font-weight:700;padding:2px 8px;display:inline-flex;gap:4px;align-items:center}
.tg svg{width:11px;height:11px}
.tg.idag{background:var(--blue-soft);color:var(--blue)}
.tg.haster{background:var(--ksfbeaea);color:var(--red)}
.tg.kjop{background:var(--ksfbeed6);color:var(--kt9a6112)}
.meta{color:var(--muted);font-size:11.5px;margin-top:5px;display:flex;gap:11px;align-items:center;flex-wrap:wrap}
.meta span,.meta a{display:inline-flex;align-items:center;gap:5px;min-width:0}
.meta svg{width:12px;height:12px;flex:0 0 auto}
.meta a{color:var(--blue);text-decoration:none}
.pbar{height:5px;background:var(--mist);border-radius:5px;width:64px;overflow:hidden;display:inline-block}
.pbar span{display:block;height:100%;background:var(--petrol)}
.note{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:170px}
.thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;flex:0 0 auto}
.ico{display:flex;flex-direction:column;gap:5px}
.ib{background:none;border:none;color:var(--kt9aa8a3);cursor:pointer;padding:4px}
.ib svg{width:18px;height:18px}
.ib.fav.on{color:var(--amber)}
.empty{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:34px 18px;text-align:center;color:var(--muted)}
.empty svg{width:34px;height:34px;opacity:.4;margin-bottom:9px}
.fab{position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom) + 18px);width:58px;height:58px;border-radius:50%;background:var(--petrol);color:#fff;border:none;box-shadow:0 5px 18px rgba(14,91,97,.4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:25}
.fab svg{width:25px;height:25px;stroke-width:2.4}
.sheet{position:fixed;inset:0;background:rgba(22,32,29,.5);z-index:40;display:none;align-items:flex-end}
.sheet.on{display:flex}
.sheet-in{background:var(--paper);width:100%;max-height:94vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column}
.sh{display:flex;align-items:center;gap:10px;padding:14px 15px;border-bottom:1px solid var(--line-soft)}
.sh h3{font-family:var(--font-d);font-size:16px;font-weight:600;flex:1;margin:0}
.sb{flex:1;overflow-y:auto;padding:14px 15px calc(env(safe-area-inset-bottom) + 14px);display:flex;flex-direction:column;gap:13px;-webkit-overflow-scrolling:touch}
.sf{display:flex;gap:9px;padding:12px 15px calc(env(safe-area-inset-bottom) + 12px);border-top:1px solid var(--line-soft)}
.f label{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);margin-bottom:5px}
.f input,.f textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--paper)}
.f textarea{min-height:64px;resize:vertical}
.seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.segb{flex:1;border:none;background:var(--paper);padding:12px 4px;font-size:12.5px;font-weight:600;color:var(--kt46524e);border-right:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.segb:last-child{border-right:none}
.segb svg{width:15px;height:15px}
.segb.idag.on{background:var(--blue-soft);color:var(--blue)}
.segb.haster.on{background:var(--ksfbeaea);color:var(--red)}
.segb.kjop.on{background:var(--ksfbeed6);color:var(--kt9a6112)}
.segb.abcA.on{background:var(--red);color:#fff}
.segb.abcB.on{background:var(--amber);color:#fff}
.segb.abcC.on{background:var(--green);color:#fff}
.frame{border:1px solid var(--line);background:var(--mist);border-radius:12px;padding:12px}
.flab{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--petrol-600);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.flab svg{width:14px;height:14px}
.crow{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.cbox{width:22px;height:22px;border:1.8px solid var(--ksc3cecb);border-radius:6px;flex:0 0 auto;background:var(--paper);cursor:pointer;position:relative;padding:0}
.cbox.on{background:var(--green);border-color:var(--green)}
.cbox.on::after{content:'';position:absolute;left:6.5px;top:2.5px;width:4px;height:10px;border:solid var(--ksfff);border-width:0 2.2px 2.2px 0;transform:rotate(45deg)}
.ctext{flex:1;border:1px solid var(--line);border-radius:8px;padding:9px 10px;background:var(--paper)}
.crow.done .ctext{text-decoration:line-through;color:var(--muted)}
.btn{border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;color:var(--kt46524e);cursor:pointer;display:inline-flex;gap:7px;align-items:center;justify-content:center}
.btn svg{width:16px;height:16px}
.btn.pri{background:var(--petrol);color:#fff;border-color:var(--petrol);flex:1}
.btn.del{color:var(--red);border-color:var(--ksf0d5d2)}
.btn.ghost{background:var(--paper)}
.btn.sm{padding:8px 12px;font-size:12.5px}
.star{border:1px solid var(--line);background:var(--paper);color:var(--muted);border-radius:10px;padding:9px 13px;font-size:12.5px;font-weight:600;display:inline-flex;gap:6px;align-items:center;cursor:pointer}
.star svg{width:15px;height:15px}
.star.on{border-color:var(--ksf0dcae);background:var(--ksfdf6e8);color:var(--amber)}
.drop{border:2px dashed var(--ksb6c8c4);background:var(--paper);border-radius:11px;padding:18px;text-align:center;color:var(--kt5f6f6a);font-size:12.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px}
.drop svg{width:24px;height:24px;color:var(--petrol)}
.imgrow{display:flex;gap:12px;align-items:center}
.thumbbig{width:96px;height:96px;border-radius:11px;object-fit:cover;border:1px solid var(--line)}
.two{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.stat{border:1px solid var(--line);background:var(--mist);border-radius:11px;padding:11px 12px;font-size:12.5px;color:var(--kt46524e);display:flex;gap:8px;flex-direction:column;margin-bottom:12px}
.stat div{display:flex;justify-content:space-between}
.stat b{color:var(--ink)}
.syncbtns{display:flex;flex-direction:column;gap:9px}
.sbtn{border:1px solid var(--line);background:var(--paper);border-radius:11px;padding:13px;display:flex;align-items:center;gap:11px;cursor:pointer;text-align:left}
.sbtn svg{width:20px;height:20px;color:var(--petrol);flex:0 0 auto}
.sbtn .tt{font-weight:600;font-size:14px}
.sbtn small{display:block;font-weight:400;font-size:11.5px;color:var(--muted);margin-top:1px}
.sbtn.pri{background:var(--petrol);color:#fff;border-color:var(--petrol)}
.sbtn.pri svg{color:#fff}
.sbtn.pri small{color:rgba(255,255,255,.8)}
.res{border:1px solid var(--ksbfe3cd);background:var(--kse4f3ea);border-radius:11px;padding:11px 12px;font-size:12.5px;color:var(--kt1f7a4d);margin-top:11px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 92px);background:var(--ink);color:#fff;padding:11px 17px;border-radius:11px;font-size:13.5px;z-index:60;opacity:0;transition:.22s;pointer-events:none;max-width:88vw;text-align:center}
.toast.on{opacity:1}
.build{text-align:center;color:var(--muted);font-size:10.5px;padding:14px 0 4px}
.viewseg{display:flex;gap:6px;margin-bottom:11px}
.catseg{display:flex;flex-wrap:wrap;gap:7px}
.catsegb{border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:600;color:var(--kt46524e);display:inline-flex;align-items:center;gap:7px}
.catsegb .catdot{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.catsegb.on{border-color:var(--cc);color:var(--ink)}
.catempty{border:1px dashed var(--line);border-radius:11px;padding:11px;text-align:center;color:var(--muted);font-size:12px;margin-bottom:9px;background:var(--mist)}
.catrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px;background:var(--paper)}
.catrow.dragging{border-color:var(--ks9cc4c4);box-shadow:0 8px 22px rgba(14,91,97,.2);background:var(--ksf5fbfa)}
.catrow .grip{padding:3px}
.catbadge{width:28px;height:28px;border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto}
.catinfo{flex:1;min-width:0}
.catinfo .cn{font-weight:600;font-size:14px}
.catinfo .cc{font-size:11px;color:var(--muted)}
.catadd{border:2px dashed var(--ksb6c8c4);border-radius:12px;padding:12px;margin-top:10px;display:flex;flex-direction:column;gap:10px}
.catadd input{border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:var(--paper)}
.swrow{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:30px;height:30px;border-radius:9px;border:none;position:relative;flex:0 0 auto}
.sw.on::after{content:'';position:absolute;inset:-3px;border:2.5px solid var(--ink);border-radius:11px}
.grip{background:none;border:none;color:var(--ktb6c2be);padding:4px 5px;flex:0 0 auto;display:flex;align-items:center;touch-action:none;cursor:grab}
.grip svg{width:20px;height:20px}
.card.cdrag{padding-left:6px}
.card.dragging{border-color:var(--ks9cc4c4);box-shadow:0 8px 22px rgba(14,91,97,.2);background:var(--ksf5fbfa);opacity:.97}
body.dragging-active{-webkit-user-select:none;user-select:none;cursor:grabbing}
body.dragging-active .grip{cursor:grabbing}
.draghint{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;margin:0 0 10px 2px}
.draghint svg{width:14px;height:14px;color:var(--petrol)}
.calbox{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:10px}
.chead{display:flex;align-items:center;gap:8px;margin-bottom:11px}
.chead h3{font-family:var(--font-d);font-size:15px;font-weight:600;flex:1;text-transform:capitalize}
.cnav{width:34px;height:34px;border:1px solid var(--line);background:var(--paper);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--kt46524e);cursor:pointer;flex:0 0 auto}
.cnav svg{width:18px;height:18px}
.cnav.today{width:auto;padding:0 12px;font-size:12px;font-weight:600}
.cdow{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cdow span{text-align:center;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--muted)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ccell{border:1px solid var(--line-soft);border-radius:7px;min-height:36px;padding:3px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.ccell.out{background:var(--ksf7faf9);opacity:.5}
.ccell.today{border-color:var(--petrol);background:var(--petrol-050)}
.cdn{font-size:10px;font-weight:700;color:var(--kt46524e)}
.ccell.today .cdn{color:var(--petrol)}
.cdots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;min-height:6px}
.cdot{width:4px;height:4px;border-radius:50%}
.cleg{display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--muted)}
.cleg span{display:inline-flex;align-items:center;gap:5px}
.csw{width:9px;height:9px;border-radius:3px}
.cnodate{background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:10px;margin-top:10px}
.cndhead{font-family:var(--font-d);font-size:12px;font-weight:600;color:var(--kt5f6f6a);margin-bottom:7px}
.greetbtn{background:none;border:none;padding:0;color:#fff;display:flex;align-items:center;gap:8px;cursor:pointer}
.greetbtn .hi{font-family:var(--font-d);font-size:20px;font-weight:600}
.greetbtn svg{width:15px;height:15px;opacity:.55}
.clockrow{display:flex;align-items:center;gap:12px;margin-top:13px;background:rgba(255,255,255,.12);border-radius:12px;padding:12px 13px}
.ctime{font-family:var(--font-d);font-size:33px;font-weight:600;line-height:1;letter-spacing:.5px;font-variant-numeric:tabular-nums}
.cdate{font-size:11.5px;opacity:.82;margin-top:5px;text-transform:capitalize}
.cico{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.cico svg{width:22px;height:22px}
.q{display:flex;gap:7px;margin-bottom:12px}
.q input{flex:1;border:1px solid var(--line);border-radius:11px;padding:12px 13px;background:var(--paper)}
.q button{background:var(--petrol);color:#fff;border:none;border-radius:11px;width:48px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.q button svg{width:21px;height:21px;stroke-width:2.4}
.big{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.b{border-radius:13px;padding:13px;color:#fff;border:none;text-align:left;cursor:pointer}
.b.h{background:var(--red)}
.b.i{background:var(--blue)}
.b .n{font-family:var(--font-d);font-size:25px;font-weight:600;line-height:1}
.b .l{font-size:11.5px;opacity:.92;margin-top:4px;display:flex;align-items:center;gap:5px}
.b .l svg{width:13px;height:13px}
.mini{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.m{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px;display:flex;align-items:center;gap:9px;cursor:pointer;text-align:left}
.m .ic{width:29px;height:29px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.m .ic svg{width:15px;height:15px}
.m.k .ic{background:var(--ksfbeed6);color:var(--kt9a6112)}
.m.f .ic{background:var(--ksfdf6e8);color:var(--amber)}
.m .n{font-family:var(--font-d);font-size:17px;font-weight:600}
.m .l{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.2px}
.sec2{font-family:var(--font-d);font-weight:600;font-size:12.5px;color:var(--kt5f6f6a);margin:0 0 8px 2px;display:flex;align-items:center;gap:7px}
.sec2 svg{width:14px;height:14px;color:var(--red)}
.sec2 .all{margin-left:auto;font-weight:500;font-size:11.5px;color:var(--petrol);background:none;border:none;cursor:pointer}
.card .s{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;gap:6px;align-items:center}
.card .abc{width:18px;height:18px;border-radius:5px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;flex:0 0 auto}
.sync{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 12px;display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--kt5f6f6a);margin-top:13px}
.sync svg{width:17px;height:17px;color:var(--petrol);flex:0 0 auto}
.sync b{color:var(--ink)}
.sync.bad{border-color:var(--ksf0dcae);background:var(--ksfdf6e8)}
.sync.bad svg{color:var(--kt9a6112)}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2600);}

/* ---------- LAGRING: IndexedDB -> localStorage -> minne ---------- */
const DB_KEY='tettpa-todo-iphone';
let db={todos:[],todoDeleted:[],meta:{}};
let storeMode='minne', idb=null;
function openIdb(){
  return new Promise(res=>{
    if(!('indexedDB' in window))return res(null);
    let req;
    try{req=indexedDB.open(DB_KEY,1);}catch(e){return res(null);}
    req.onupgradeneeded=()=>{try{req.result.createObjectStore('kv');}catch(e){}};
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>res(null);
    setTimeout(()=>res(null),2500);
  });
}
function idbGet(){
  return new Promise(res=>{
    if(!idb)return res(null);
    try{const r=idb.transaction('kv','readonly').objectStore('kv').get('state');
      r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);}catch(e){res(null);}
  });
}
function idbPut(v){
  return new Promise(res=>{
    if(!idb)return res(false);
    try{const r=idb.transaction('kv','readwrite').objectStore('kv').put(v,'state');
      r.onsuccess=()=>res(true);r.onerror=()=>res(false);}catch(e){res(false);}
  });
}
async function load(){
  idb=await openIdb();
  if(idb){const v=await idbGet();if(v){db=Object.assign(db,v);}storeMode='idb';return;}
  try{const raw=localStorage.getItem(DB_KEY);if(raw)db=Object.assign(db,JSON.parse(raw));
    localStorage.setItem(DB_KEY+'-probe','1');localStorage.removeItem(DB_KEY+'-probe');
    storeMode='local';return;}catch(e){}
  storeMode='minne';
}
function save(){
  if(!Array.isArray(db.todos))db.todos=[];
  if(!Array.isArray(db.todoDeleted))db.todoDeleted=[];
  if(storeMode==='idb'){idbPut(db);return;}
  if(storeMode==='local'){try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){storeMode='minne';renderWarn();}return;}
}
function renderWarn(){
  const el=document.getElementById('warnbar');
  if(storeMode==='minne'){
    el.className='warnbar';
    el.innerHTML=`${svg('warn')}<div><b>Ingen lagring tilgjengelig.</b> Data forsvinner når du lukker fanen. Eksporter synkfilen før du går ut — eller legg appen på en nettadresse.</div>`;
  }else el.innerHTML='';
}

/* ---------- SYNK (identisk logikk som TettPå 2.0) ---------- */
const TODO_SYNC_APP='TettPaa-ToDo', TODO_SYNC_VER=1, TODO_TOMB_MS=90*864e5, TODO_SOURCE='iPhone';
function todoSyncStamp(d){const p=n=>String(n).padStart(2,'0');d=d||new Date();return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes());}
function todoSyncFilename(withImages){return TODO_SYNC_APP+'_'+TODO_SOURCE+'_'+todoSyncStamp()+(withImages?'':'_uten-bilder')+'.json';}
function todoSyncWhen(ts){if(!ts)return '';const d=new Date(ts);if(isNaN(d))return '';return d.toLocaleDateString('nb-NO',{day:'numeric',month:'long'})+' kl. '+d.toTimeString().slice(0,5);}
function todoMergeData(localTodos,localDel,inTodos,inDel){
  const now=Date.now();
  const delMap={};
  [].concat(localDel||[],inDel||[]).forEach(d=>{if(d&&d.id){const at=d.deletedAt||0;if(!delMap[d.id]||at>delMap[d.id])delMap[d.id]=at;}});
  const map={};
  (localTodos||[]).forEach(t=>{if(t&&t.id)map[t.id]=t;});
  let added=0,updated=0,removed=0,unchanged=0;
  (inTodos||[]).forEach(t=>{
    if(!t||!t.id)return;
    const cur=map[t.id];
    if(!cur){map[t.id]=t;added++;return;}
    if((t.updated||0)>(cur.updated||0)){
      const o=Object.assign({},t);
      if(!('image' in t)&&cur.image)o.image=cur.image;
      map[t.id]=o;updated++;
    }else unchanged++;
  });
  Object.keys(delMap).forEach(id=>{
    const t=map[id];
    if(t&&(t.updated||0)<=delMap[id]){delete map[id];removed++;}
  });
  const deleted=Object.keys(delMap)
    .filter(id=>(now-delMap[id])<TODO_TOMB_MS&&!map[id])
    .map(id=>({id,deletedAt:delMap[id]}));
  return {todos:Object.keys(map).map(k=>map[k]),deleted,stats:{added,updated,removed,unchanged}};
}
function todoSyncPayload(withImages){
  const todos=(db.todos||[]).map(t=>{
    const c=Object.assign({},t);
    if(!withImages)delete c.image;
    if(!c.updated)c.updated=c.created||Date.now();
    return c;
  });
  const now=Date.now();
  const deleted=(db.todoDeleted||[]).filter(d=>(now-(d.deletedAt||0))<TODO_TOMB_MS);
  return {app:TODO_SYNC_APP,version:TODO_SYNC_VER,source:TODO_SOURCE,exportedAt:now,withImages:!!withImages,cats:(db.todoCats||[]).map(c=>c.slice()),tags:(db.todoTags||[]).map(t=>t.slice()),dividers:(db.todoDividers||[]).map(d=>({id:d.id,label:d.label,ord:d.ord,mtime:d.mtime})),todos,deleted};
}
let syncResult='', syncFrom='';
function todoSyncExport(withImages){
  try{
    const data=JSON.stringify(todoSyncPayload(withImages),null,1);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=todoSyncFilename(withImages);
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    db.meta.todoLastSync=Date.now();save();
    toast('Synkfil eksportert'+(withImages?' (med bilder)':' (uten bilder)'));
    renderSync();
  }catch(e){toast('Kunne ikke eksportere.');}
}
function todoSyncApply(raw){
  let d;
  try{d=JSON.parse(raw);}catch(e){toast('Filen er ikke gyldig JSON.');return;}
  if(!d||d.app!==TODO_SYNC_APP||!Array.isArray(d.todos)){toast('Dette er ikke en TettPå ToDo-synkfil.');return;}
  if((d.version||1)>TODO_SYNC_VER){toast('Filen er laget av en nyere versjon.');return;}
  const r=todoMergeData(db.todos||[],db.todoDeleted||[],d.todos,d.deleted||[]);
  if(Array.isArray(d.cats)&&d.cats.length){
    if(!Array.isArray(db.todoCats))db.todoCats=[];
    d.cats.forEach(c=>{if(!Array.isArray(c)||!c[0])return;const ex=db.todoCats.find(x=>x[0]===c[0]);if(!ex){db.todoCats.push(c.slice());}else{const im=c[3]||0;if(im>(ex[3]||0)){ex[1]=c[1];ex[2]=c[2];ex[3]=im;}}});
  }
  if(Array.isArray(d.tags)&&d.tags.length){
    if(!Array.isArray(db.todoTags))db.todoTags=[];
    d.tags.forEach(t=>{if(!Array.isArray(t)||!t[0])return;const ex=db.todoTags.find(x=>x[0]===t[0]);if(!ex){db.todoTags.push(t.slice());}else{const im=t[5]||0;if(im>(ex[5]||0)){ex[1]=t[1];ex[2]=t[2];ex[3]=t[3];ex[5]=im;}}});
  }
  if(Array.isArray(d.dividers)&&d.dividers.length){
    if(!Array.isArray(db.todoDividers))db.todoDividers=[];
    d.dividers.forEach(x=>{if(!x||!x.id)return;const ex=db.todoDividers.find(y=>y.id===x.id);if(!ex){db.todoDividers.push({id:x.id,label:x.label||'Skillelinje',ord:x.ord,mtime:x.mtime||0});}else{const im=x.mtime||0;if(im>(ex.mtime||0)){ex.label=x.label||'Skillelinje';ex.ord=x.ord;ex.mtime=im;}}});
  }
  db.todos=r.todos;db.todoDeleted=r.deleted;db.meta.todoLastSync=Date.now();
  save();
  const s=r.stats;
  const src=d.source||'ukjent kilde';
  const when=todoSyncWhen(d.exportedAt);
  syncFrom=`Fra <b>${esc(src)}</b>${when?', eksportert '+esc(when):''}${d.withImages===false?' · uten bilder':''}`;
  syncResult=`${s.added} nye · ${s.updated} oppdatert · ${s.removed} slettet · ${s.unchanged} uendret`;
  toast('Flettet fra '+src+': '+syncResult);
  renderSync();
}
function todoSyncReplace(raw){
  let d;
  try{d=JSON.parse(raw);}catch(e){toast('Filen er ikke gyldig JSON.');return;}
  if(!d||d.app!==TODO_SYNC_APP||!Array.isArray(d.todos)){toast('Dette er ikke en TettPå ToDo-synkfil.');return;}
  if((d.version||1)>TODO_SYNC_VER){toast('Filen er laget av en nyere versjon.');return;}
  db.todos=d.todos.map(t=>Object.assign({},t));
  db.todoDeleted=Array.isArray(d.deleted)?d.deleted.map(x=>Object.assign({},x)):[];
  if(Array.isArray(d.cats)&&d.cats.length)db.todoCats=d.cats.map(c=>c.slice());
  if(Array.isArray(d.tags)&&d.tags.length)db.todoTags=d.tags.map(t=>t.slice());
  if(Array.isArray(d.dividers))db.todoDividers=d.dividers.map(x=>({id:x.id,label:x.label||'Skillelinje',ord:x.ord}));
  db.meta.todoLastSync=Date.now();db.meta.filter='alle';db.meta.sort=db.meta.sort||'abc';
  save();
  const src=d.source||'ukjent kilde';const when=todoSyncWhen(d.exportedAt);
  syncFrom=`Fra <b>${esc(src)}</b>${when?', eksportert '+esc(when):''}`;
  syncResult=`Erstattet – ${db.todos.length} oppgaver hentet fra fila`;
  toast('Alt erstattet med fila');
  render();renderSync();
}

/* ---------- DATA ---------- */
const TODO_TAG_DEFAULTS=[['idag','I dag','sun','#2f6fb0'],['imorgen','I morgen','sun','#0e5b61'],['denneuken','Denne uken','cal','#2f8f5b'],['nesteuke','Neste uke','cal','#7b5bb5'],['haster','Haster','flame','#c0413b'],['senere','Senere','clock','#8a6d3b'],['kjop','Kjøp','cart','#d98324']];
const TODO_TAG_ICONS=['sun','cal','clock','flame','cart','star','check','tag'];
function todoTags(){if(!Array.isArray(db.todoTags)||!db.todoTags.length)db.todoTags=TODO_TAG_DEFAULTS.map(t=>t.slice());db.todoTags=db.todoTags.map(t=>[t[0],t[1]||t[0],t[2]||'tag',t[3]||'#8a938f',!!t[4],t[5]||0]);return db.todoTags;}
function tagColor(k){return tagMeta(k)[3];}
function tagChip(k){const m=tagMeta(k);return `<span class="tg" style="background:${m[3]}22;color:${m[3]}">${svg(m[2])}${esc(m[1])}</span>`;}
const TODO_CAT_DEFAULTS=[['A','Viktigst','#c0413b'],['B','Bør gjøres','#d98324'],['C','Kan vente','#2f8f5b']];
const TODO_CAT_COLORS=['#c0413b','#d98324','#2f8f5b','#0e5b61','#2f6fb0','#7b5bb5','#c85b9e','#6b7280','#8a6d3b','#1f7a4d'];
function cats(){if(!Array.isArray(db.todoCats)||!db.todoCats.length)db.todoCats=TODO_CAT_DEFAULTS.map(c=>c.slice());return db.todoCats;}
function catMeta(k){return cats().find(c=>c[0]===k)||cats()[0];}
function catColor(k){return catMeta(k)[2];}
function catCount(k){return (db.todos||[]).filter(t=>(t.abc||cats()[0][0])===k).length;}
function nextCatId(name){
  const used=new Set(cats().map(c=>c[0]));
  const first=(name||'').trim().charAt(0).toUpperCase();
  if(/[A-ZÆØÅ0-9]/.test(first)&&!used.has(first))return first;
  for(const ch of 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'){if(!used.has(ch))return ch;}
  let i=1;while(used.has('K'+i))i++;return 'K'+i;
}
function normalizeTags(){if(!Array.isArray(db.todoTags)||!db.todoTags.length)db.todoTags=TODO_TAG_DEFAULTS.map(t=>t.slice());if(!Array.isArray(db.todoDividers))db.todoDividers=[];}
function normalizeCats(){normalizeTags();const cids=new Set(cats().map(c=>c[0]));(db.todos||[]).forEach(t=>{if(t.abc&&!cids.has(t.abc))t.abc=cats()[0][0];});}
function tagMeta(k){return todoTags().find(t=>t[0]===k)||[k,k,'tag','#8a938f'];}
function getFilter(){return db.meta.filter||'alle';}
function getSort(){return db.meta.sort||'abc';}
function getHide(){return !!db.meta.hideDone;}
function chkDone(t){return (t.checklist||[]).filter(c=>c.done).length;}
function host(u){try{return new URL(u).hostname.replace(/^www\./,'');}catch(e){return u;}}
function baseList(){
  let l=(db.todos||[]).slice();
  const f=getFilter();
  if(f==='fav')l=l.filter(t=>t.fav);
  else if(f!=='alle')l=l.filter(t=>(t.tags||[]).includes(f));
  const q=(db.meta.search||'').trim().toLowerCase();
  if(q)l=l.filter(t=>(((t.title||'')+' '+(t.note||'')).toLowerCase().includes(q)));
  if(getHide())l=l.filter(t=>!t.done);
  return l;
}
function sorted(list){
  const s=getSort();
  const ord=t=>({A:0,B:1,C:2})[t.abc||'B'];
  if(s==='egen'){
    return list.slice().sort((a,b)=>{
      const ao=a.ord==null?1e9:a.ord, bo=b.ord==null?1e9:b.ord;
      if(ao!==bo)return ao-bo;
      return (a.created||0)-(b.created||0);
    });
  }
  return list.slice().sort((a,b)=>{
    if(a.done!==b.done)return a.done?1:-1;
    if(s==='fav'&&!!a.fav!==!!b.fav)return a.fav?-1:1;
    if(s==='nyeste')return (b.created||0)-(a.created||0);
    if(s==='az'){const d=(a.title||'').localeCompare(b.title||'','nb',{sensitivity:'base',numeric:true});if(d)return d;}
    if(s==='dato'){const ad=a.date||'9999-99-99',bd=b.date||'9999-99-99';if(ad!==bd)return ad<bd?-1:1;}
    if(s==='abc'){const d=ord(a)-ord(b);if(d)return d;}
    return (b.created||0)-(a.created||0);
  });
}
function getView(){return db.meta.view||'liste';}
function getCalMonth(){const d=new Date(),p=n=>String(n).padStart(2,'0');return db.meta.calMonth||(d.getFullYear()+'-'+p(d.getMonth()+1));}
function imageFrom(file,cb){
  if(!file||!/^image\//.test(file.type||'')){toast('Velg en bildefil.');return;}
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=1000;let w=img.width,h=img.height;
    if(w>max||h>max){const sc=Math.min(max/w,max/h);w=Math.round(w*sc);h=Math.round(h*sc);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    try{cb(cv.toDataURL('image/jpeg',0.8));}catch(e){toast('Kunne ikke lese bildet.');}
  };img.onerror=()=>toast('Kunne ikke lese bildet.');img.src=String(r.result);};
  r.readAsDataURL(file);
}

  document.getElementById('sheet').classList.add('on');
  document.body.style.overflow='hidden';
}
function sheetClose(){document.getElementById('sheet').classList.remove('on');document.body.style.overflow='';}
document.getElementById('shClose').innerHTML=svg('x');
document.getElementById('shClose').onclick=sheetClose;
document.getElementById('sheet').addEventListener('click',e=>{if(e.target.id==='sheet')sheetClose();});

let imgTmp=null;

    <button type="button" class="cbox${c.done?' on':''}" data-chk></button>
    <input class="ctext" value="${esc(c.text||'')}" placeholder="Punkt…">
    <button type="button" class="ib" data-chkdel>${svg('trash')}</button>

function readChecks(){
  return [...document.querySelectorAll('#tdChecks .crow')].map(r=>({

    if(id){Object.assign(db.todos.find(x=>x.id===id),obj);}
    else{obj.id=uid();obj.done=false;obj.created=Date.now();db.todos.push(obj);}
    save();sheetClose();toast(id?'Oppdatert':'Lagt til');render();
  };
}
function wireDrop(){
  const dz=document.getElementById('tdDrop');if(!dz)return;
  dz.onclick=()=>document.getElementById('tdFile').click();
}

function renderSync(){
  const n=(db.todos||[]).length, dl=(db.todoDeleted||[]).length;
  const last=db.meta.todoLastSync?fdate(db.meta.todoLastSync):'aldri';
  let kb=0;try{kb=Math.round(JSON.stringify(todoSyncPayload(true)).length/1024);}catch(e){}
  sheetOpen('Synk',`
    <div class="stat">
      <div><span>ToDo</span><b>${n}</b></div>
      <div><span>Gravsteiner</span><b>${dl}</b></div>
      <div><span>Sist synkronisert</span><b>${last}</b></div>
      <div><span>Filstørrelse ca.</span><b>${kb} kB</b></div>
      <div><span>Lagring</span><b>${storeMode==='idb'?'IndexedDB':(storeMode==='local'?'localStorage':'kun minne ⚠️')}</b></div>
    </div>
    <div class="syncbtns">
      <button class="sbtn pri" data-exp="1">${svg('download')}<div><span class="tt">Eksporter med bilder</span><small>Full kopi · ${kb} kB</small></div></button>
      <button class="sbtn" data-exp="0">${svg('download')}<div><span class="tt">Eksporter uten bilder</span><small>Mindre fil · bilder beholdes lokalt</small></div></button>
      <label class="sbtn" id="impBtn" for="syncFile">${svg('upload')}<div><span class="tt">Importer &amp; flett</span><small>Velg synkfil fra Filer</small></div></label>
      <label class="sbtn" id="replBtn" for="replaceFile">${svg('refresh')}<div><span class="tt">Erstatt alt med denne fila</span><small>Ren import – ingen fletting</small></div></label>
    </div>
    <input type="file" id="syncFile" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden">
    <input type="file" id="replaceFile" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden">
    ${syncResult?`<div class="res">${syncFrom?syncFrom+'<br>':''}<b>Flettet:</b> ${esc(syncResult)}</div>`:''}
    <div style="font-size:11px;color:var(--muted);margin-top:8px;overflow-wrap:anywhere">Filnavn: <code>${esc(todoSyncFilename(true))}</code></div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.55">Nyeste endring vinner. Slettinger følger med som gravsteiner. Har du endret en oppgave etter at den ble slettet et annet sted, blir den stående.</div>
    <div class="danger">
      <div class="dh">${svg('warn')} Faresone</div>
      <div class="ds">Kan ikke angres. Ta gjerne en eksport først.</div>
      <button class="dbtn warn" data-purge="1">${svg('check')}<span>Fjern fullførte oppgaver</span></button>
      <button class="dbtn del" data-wipe="1">${svg('trash')}<span>Slett alle data</span></button>
    </div>
  `,`<button class="btn pri" id="syncClose">Lukk</button>`);
  document.getElementById('syncClose').onclick=()=>{sheetClose();tab='hjem';render();};
  const sf=document.getElementById('syncFile');
  sf.onchange=()=>{const f=sf.files&&sf.files[0];if(f){const r=new FileReader();r.onload=()=>todoSyncApply(String(r.result||''));r.readAsText(f);}sf.value='';};
  const rf=document.getElementById('replaceFile');
  if(rf)rf.onchange=()=>{const f=rf.files&&rf.files[0];if(f){if(confirm('Erstatte ALT med denne fila?\n\nAlt som ligger i appen nå slettes og byttes ut med innholdet i fila. Ta gjerne en eksport først.')){const r=new FileReader();r.onload=()=>todoSyncReplace(String(r.result||''));r.readAsText(f);}}rf.value='';};
  document.getElementById('shBody').onclick=e=>{
    const b=e.target.closest('[data-exp]');
    if(b){todoSyncExport(b.dataset.exp==='1');return;}
    if(e.target.closest('[data-purge]')){purgeDone();return;}
    if(e.target.closest('[data-wipe]')){wipeAll();return;}
  };
}

let tab='hjem', clockT=null;
function greetWord(){const h=new Date().getHours();return h<12?'God morgen':(h<18?'God ettermiddag':'God kveld');}
function clockHm(){const d=new Date(),p=n=>String(n).padStart(2,'0');return p(d.getHours())+':'+p(d.getMinutes());}
function clockDate(){return new Date().toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function startClock(){
  if(clockT)clearInterval(clockT);
  clockT=setInterval(()=>{
    const hm=document.getElementById('clkHm');if(hm)hm.textContent=clockHm();
    const g=document.getElementById('greetTxt');if(g)g.textContent=greetWord()+(db.meta.name?', '+db.meta.name:'');
  },15000);
}

function tagAddFromSheet(){
  const name=(document.getElementById('tagName').value||'').trim();
  if(!name){toast('Skriv et navn på når-valget.');return;}
  const base=name.toLowerCase().replace(/[^a-z0-9]/g,'')||'tag';const ex=new Set(todoTags().map(t=>t[0]));let id=base,i=2;while(ex.has(id))id=base+(i++);
  todoTags().push([id,name,tagSheetIcon,tagSheetColor,false,Date.now()]);
  save();render();renderTagSheet();toast('Når-valg lagt til');
}
function wireTagSheetDrag(list){
  list.querySelectorAll('.grip').forEach(grip=>{
    grip.style.touchAction='none';
    grip.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();});
    grip.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return;
      e.preventDefault();e.stopPropagation();
      const dragEl=grip.closest('.catrow');if(!dragEl)return;
      dragEl.classList.add('dragging');document.body.classList.add('dragging-active');
      const move=ev=>{
        const rows=[...list.querySelectorAll('.catrow:not(.dragging)')];
        const y=ev.clientY;let ref=null;
        for(const r of rows){const bb=r.getBoundingClientRect();if(y<bb.top+bb.height/2){ref=r;break;}}
        if(ref)list.insertBefore(dragEl,ref);else list.appendChild(dragEl);
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);
        document.removeEventListener('pointerup',up);
        document.removeEventListener('pointercancel',up);
        document.body.classList.remove('dragging-active');
        dragEl.classList.remove('dragging');
        const ids=[...list.querySelectorAll('.catrow')].map(r=>r.dataset.id);
        db.todoTags=ids.map(id=>todoTags().find(t=>t[0]===id)).filter(Boolean);
        save();render();renderTagSheet();
      };
      document.addEventListener('pointermove',move);
      document.addEventListener('pointerup',up);
      document.addEventListener('pointercancel',up);
    });
  });
}

      };

function calHtml(){
  const ym=getCalMonth();
  const Y=Number(ym.slice(0,4)),M=Number(ym.slice(5,7));
  const startDow=(new Date(Y,M-1,1).getDay()+6)%7;
  const daysIn=new Date(Y,M,0).getDate();
  const prevDays=new Date(Y,M-1,0).getDate();
  const MN=['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const p=n=>String(n).padStart(2,'0');
  const td=(()=>{const d=new Date();return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());})();
  const byDate={};(db.todos||[]).forEach(t=>{if(t.date){(byDate[t.date]=byDate[t.date]||[]).push(t);}});
  const abcCol=k=>catColor(k);
  const cells=[];
  for(let i=0;i<42;i++){
    const dayNum=i-startDow+1;let cy=Y,cm=M,dn=dayNum,out=false;
    if(dayNum<1){out=true;cm=M-1;dn=prevDays+dayNum;if(cm<1){cm=12;cy=Y-1;}}
    else if(dayNum>daysIn){out=true;cm=M+1;dn=dayNum-daysIn;if(cm>12){cm=1;cy=Y+1;}}
    const ds=cy+'-'+p(cm)+'-'+p(dn);
    cells.push({ds,dn,out,today:ds===td,items:byDate[ds]||[]});
  }
  let weeks=6;while(weeks>4&&cells.slice((weeks-1)*7,weeks*7).every(c=>c.out))weeks--;
  const grid=cells.slice(0,weeks*7).map(c=>{
    const dots=c.items.slice(0,4).map(t=>`<span class="cdot" style="background:${abcCol(t.abc||'B')}${t.done?';opacity:.4':''}"></span>`).join('');
    return `<div class="ccell${c.out?' out':''}${c.today?' today':''}" data-calday="${c.ds}"><span class="cdn">${c.dn}</span><span class="cdots">${dots}</span></div>`;
  }).join('');
  const undated=(db.todos||[]).filter(t=>!t.date);
  const und=undated.length?`<div class="cnodate"><div class="cndhead">Uten dato · ${undated.length}</div>${undated.map(t=>cardHtml(t,false,true)).join('')}</div>`:'';
  return `<div class="calbox">
      <div class="chead"><button class="cnav" data-calnav="prev">${svg('back')}</button><h3>${MN[M-1]} ${Y}</h3><button class="cnav" data-calnav="next">${svg('fwd')}</button><button class="cnav today" data-calnav="today">I dag</button></div>
      <div class="cdow">${['M','T','O','T','F','L','S'].map(d=>`<span>${d}</span>`).join('')}</div>
      <div class="cgrid">${grid}</div>
      <div class="cleg">${cats().map(([k,l,c])=>`<span><span class="csw" style="background:${c}"></span>${esc(k)}</span>`).join('')}</div>
    </div>${und}`;
}

function parseYmd(s){const a=String(s).split('-').map(Number);return new Date(a[0],(a[1]||1)-1,a[2]||1);}
function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-((t.getDay()+6)%7));const w1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w1)/86400000-3+((w1.getDay()+6)%7))/7);}

  const byDate={};(db.todos||[]).forEach(t=>{if(t.date)(byDate[t.date]=byDate[t.date]||[]).push(t);});
  const end=new Date(anchor);end.setDate(end.getDate()+6);
  const range=anchor.getDate()+'.\u2013'+end.getDate()+'. '+_MS3[end.getMonth()];
  const byOrd=(a,b)=>((a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord))||((a.created||0)-(b.created||0));
  const picker=`<div class="daypick">${_WDS.map((w,i)=>`<button class="pd ${days.includes(i)?'on':''}" data-calday-toggle="${i}">${w}</button>`).join('')}</div>`;
  let blocks='';
  for(let i=0;i<7;i++){
    if(!days.includes(i))continue;
    const d=new Date(anchor);d.setDate(d.getDate()+i);const ds=ymd(d);const today=ds===tds;
    const items=(byDate[ds]||[]).sort(byOrd);
    const lines=items.length?items.map(t=>`<div class="tline" data-edit="${t.id}"><span class="tdot" style="background:${catColor(t.abc||cats()[0][0])}${t.done?';opacity:.4':''}"></span><span class="tt${t.done?' tdone':''}">${esc(t.title||'')}</span>${(t.tags||[]).map(tagChip).join('')}</div>`).join(''):`<div class="dempty">Ingen oppgaver</div>`;
    blocks+=`<div class="wday${today?' today':''}"><div class="wdh${today?' today':''}"><span class="wdn">${_WDL[i]}</span><span class="wdd">${d.getDate()}. ${_MS3[d.getMonth()]}</span>${items.length?`<span class="wbadge">${items.length}</span>`:''}</div>${lines}</div>`;
  }
  return `<div class="wknav"><button class="cnav" data-weeknav="prev">${svg('back')}</button><h3>Uke ${isoWeek(anchor)} \u00b7 ${range}</h3><button class="cnav" data-weeknav="next">${svg('fwd')}</button><button class="cnav today" data-weeknav="today">I dag</button></div>${picker}${blocks||`<div class="dempty" style="text-align:center">Ingen valgte dager \u2013 sl\u00e5 p\u00e5 en dag-knapp over.</div>`}`;
}
function dayHtml(){
  if(!db.meta.calDay)db.meta.calDay=ymd(new Date());
  const ds=db.meta.calDay;const d=parseYmd(ds);const tds=ymd(new Date());
  const wd=_WDL[(d.getDay()+6)%7];
  const label=wd+' '+d.getDate()+'. '+_MSL[d.getMonth()];
  const byOrd=(a,b)=>((a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord))||((a.created||0)-(b.created||0));
  const items=(db.todos||[]).filter(t=>t.date===ds).sort(byOrd);
  const rows=items.length?items.map(t=>cardHtml(t,false,true)).join(''):`<div class="dempty" style="text-align:center;padding:22px 12px">Ingen oppgaver med denne datoen.</div>`;
  return `<div class="wknav"><button class="cnav" data-daynav="prev">${svg('back')}</button><h3${ds===tds?' class="istoday"':''}>${label}</h3><button class="cnav" data-daynav="next">${svg('fwd')}</button><button class="cnav today" data-daynav="today">I dag</button></div>${rows}`;
}
function boardCats(){
  const cs=cats().map(c=>c[0]);
  let b=Array.isArray(db.meta.board)?db.meta.board.filter(id=>cs.includes(id)):[];
  for(const id of cs){if(b.length>=3)break;if(!b.includes(id))b.push(id);}
  while(b.length<3)b.push(cs[0]);
  b=b.slice(0,3);db.meta.board=b;return b;
}
function boardPick(col){
  sheetOpen('Velg kategori for kolonne '+(col+1),
    cats().map(([k,l,c])=>`<button class="catpick" data-boardset="${col}:${k}"><span class="cpd" style="background:${c}"></span><span class="cpn">${esc(l)}</span><span class="cpb">${esc(k)}</span></button>`).join(''),
    `<button class="btn ghost" id="bpClose">Lukk</button>`);
  document.getElementById('bpClose').onclick=sheetClose;
  document.getElementById('shBody').addEventListener('click',e=>{
    const b=e.target.closest('[data-boardset]');if(!b)return;
    const parts=b.dataset.boardset.split(':');const ci=Number(parts[0]);
    boardCats();db.meta.board[ci]=parts[1];save();sheetClose();render();
  });
}
function commitBoard(board){
  let n=0;
  board.querySelectorAll('.kcol').forEach(col=>{
    const cat=col.dataset.cat;
    col.querySelectorAll('.kcard').forEach(c=>{const t=db.todos.find(x=>x.id===c.dataset.id);if(t){if(t.abc!==cat)t.abc=cat;t.ord=n++;t.updated=Date.now();}});
  });
  db.todos.forEach(t=>{if(t.ord==null)t.ord=n++;});
  save();render();
}
function wireBoardDrag(board){
  if(!board)return;
  board.querySelectorAll('.kcard').forEach(card=>{
    card.style.touchAction='none';
    card.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return;
      const id=card.dataset.id;const sx=e.clientX,sy=e.clientY;let dragging=false;
      const move=ev=>{
        if(!dragging){
          if(Math.abs(ev.clientX-sx)<7&&Math.abs(ev.clientY-sy)<7)return;
          dragging=true;card.classList.add('kdrag');document.body.classList.add('dragging-active');
        }
        ev.preventDefault();
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        const col=el&&el.closest('.kcol');if(!col)return;
        const kb=col.querySelector('.kbody');if(!kb)return;
        const cards=[...kb.querySelectorAll('.kcard:not(.kdrag)')];
        let ref=null;
        for(const c of cards){const r=c.getBoundingClientRect();if(ev.clientY<r.top+r.height/2){ref=c;break;}}
        const em=kb.querySelector('.kempty');if(em)em.remove();
        if(ref)kb.insertBefore(card,ref);else kb.appendChild(card);
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);document.removeEventListener('pointercancel',up);
        document.body.classList.remove('dragging-active');
        if(dragging){card.classList.remove('kdrag');commitBoard(board);}
        else{todoSheet(id);}
      };
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);document.addEventListener('pointercancel',up);
    });
  });
}
function purgeDone(){
  const done=(db.todos||[]).filter(t=>t.done);
  if(!done.length){toast('Ingen fullf\u00f8rte \u00e5 fjerne.');return;}
  if(!confirm('Fjerne '+done.length+' fullf\u00f8rt'+(done.length===1?'':'e')+' oppgave'+(done.length===1?'':'r')+'? Kan ikke angres.'))return;
  const now=Date.now();
  done.forEach(t=>db.todoDeleted.push({id:t.id,deletedAt:now}));
  db.todos=db.todos.filter(t=>!t.done);
  save();toast('Fjernet '+done.length+' fullf\u00f8rte');renderSync();
}
function wipeAll(){
  const n=(db.todos||[]).length;
  if(!n){toast('Ingen data \u00e5 slette.');return;}
  if(!confirm('Slette ALLE '+n+' oppgaver? Dette kan ikke angres.\n\nTips: ta en eksport f\u00f8rst.'))return;
  if(!confirm('Helt sikker? Alt slettes \u2013 ogs\u00e5 ved neste synk.'))return;
  const now=Date.now();
  (db.todos||[]).forEach(t=>db.todoDeleted.push({id:t.id,deletedAt:now}));
  db.todos=[];
  save();toast('Alle oppgaver slettet');renderSync();
}
function renderList(){
  const v=document.getElementById('view');
  const all=db.todos||[];
  if(!all.length){
    v.innerHTML=`<div class="empty">${svg('mobile')}<div style="font-weight:600;color:var(--ink);margin-bottom:4px">Ingen ToDo enda</div><div style="font-size:13px">Trykk + øverst, eller importer en synkfil.</div></div><div class="build">TettPå iPhone · build ${BUILD_NO} · ${BUILD_DATE}</div>`;
    return;
  }
  const view=getView();
  const viewSeg=`<div class="viewseg">
      <button class="chip ${view==='liste'?'on':''}" data-view="liste">${svg('checklist')}<span>Liste</span></button>
      <button class="chip ${view==='kalender'?'on':''}" data-view="kalender">${svg('cal')}<span>Kalender</span></button>
      <button class="chip ${view==='tavle'?'on':''}" data-view="tavle">${svg('board')}<span>Tavle</span></button>
    </div>`;
  const sq=db.meta.search||'';
  const searchBar=`<div class="lsearch"><span class="si">${svg('search')}</span><input id="listSearch" placeholder="Søk oppgave…" value="${esc(sq)}" enterkeyhint="search" autocapitalize="none">${sq?`<button class="sx" data-searchclear>${svg('close')}</button>`:''}</div>`;
  const wireSearch=()=>{const se=document.getElementById('listSearch');if(!se)return;se.addEventListener('input',()=>{db.meta.search=se.value;render();});if(sq){se.focus();try{se.setSelectionRange(se.value.length,se.value.length);}catch(e){}}};
  if(view==='kalender'){
    const cm=db.meta.calMode||'maaned';
    const calSeg=`<div class="viewseg calsub">
      <button class="chip ${cm==='maaned'?'on':''}" data-calmode="maaned">${svg('cal')}<span>Måned</span></button>
      <button class="chip ${cm==='uke'?'on':''}" data-calmode="uke">${svg('cal')}<span>Uke</span></button>
      <button class="chip ${cm==='dag'?'on':''}" data-calmode="dag">${svg('cal')}<span>Dag</span></button>
    </div>`;
    const inner=cm==='uke'?weekHtml():(cm==='dag'?dayHtml():calHtml());
    v.innerHTML=viewSeg+calSeg+inner+`<div class="build">TettPå iPhone · build ${BUILD_NO} · ${BUILD_DATE}</div>`;
    return;
  }
  if(view==='tavle'){
    const b=boardCats();const q=sq.trim().toLowerCase();const cid0=cats()[0][0];
    const byOrd=(a,b)=>((a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord))||((a.created||0)-(b.created||0));
    const cols=b.map((cat,ci)=>{
      const m=catMeta(cat);
      let items=(db.todos||[]).filter(t=>!t.done&&catMeta(t.abc||cid0)[0]===cat);
      if(q)items=items.filter(t=>(((t.title||'')+' '+(t.note||'')).toLowerCase().includes(q)));
      items=items.sort(byOrd);
      const cards=items.map(t=>`<div class="kcard" data-id="${t.id}"><div class="kct">${esc(t.title||'')}</div>${(t.tags||[]).length?`<div class="kctg">${(t.tags||[]).map(tagChip).join('')}</div>`:''}</div>`).join('')||`<div class="kempty">Tom</div>`;
      return `<div class="kcol" data-cat="${cat}" style="--cc:${m[2]}"><button class="kcolhd" data-boardpick="${ci}"><span class="kd" style="background:${m[2]}"></span><span class="knm">${esc(m[1])}</span><span class="kct2">${items.length}</span>${svg('chev')}</button><div class="kbody">${cards}</div></div>`;
    }).join('');
    v.innerHTML=viewSeg+searchBar+`<div class="board" id="board">${cols}</div><div class="draghint">${svg('grip')}Dra kort mellom kolonnene · slipp = ny kategori</div><div class="build">TettPå iPhone · build ${BUILD_NO} · ${BUILD_DATE}</div>`;
    wireBoardDrag(document.getElementById('board'));wireSearch();return;
  }
  const f=getFilter(), s=getSort();
  const cnt={alle:all.length,fav:all.filter(t=>t.fav).length};
  todoTags().forEach(([k])=>cnt[k]=all.filter(t=>(t.tags||[]).includes(k)).length);
  const tile=(k,l)=>`<button class="tile ${f===k?'on':''}" data-filter="${k}"><div class="n">${cnt[k]||0}</div><div class="l">${esc(l)}</div></button>`;
  const manualable=(f==='alle'&&!sq.trim());
  const catMode=(s==='abc');
  const catDrag=(catMode&&manualable);
  const manualDrag=(!catMode&&manualable);
  const byOrd=(a,b)=>((a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord))||((a.created||0)-(b.created||0));
  let body;
  if(s==='abc'){
    const list=sorted(baseList());
    const cid0=cats()[0][0];
    body=cats().map(([k,l,c],gi)=>{
      const items=list.filter(t=>catMeta(t.abc||cid0)[0]===k).sort(byOrd);
      return `<div class="grp${gi>0?' gsep':''}" data-cat="${k}"><span class="abc" style="background:${c}">${esc(k)}</span>${esc(l)}<span style="font-weight:400;color:var(--muted-2)"> · ${items.length}</span></div>${items.length?items.map(t=>cardHtml(t,catDrag,true)).join(''):`<div class="catempty" data-cat="${k}">Ingen oppgaver her enda</div>`}`;
    }).join('');
  }else if(s==='egen'&&manualable){
    const tasks=baseList();
    const combined=[...tasks.map(t=>({ord:t.ord==null?1e9:t.ord,cr:t.created||0,kind:'t',t})),...todoDividers().map(d=>({ord:d.ord==null?1e9:d.ord,cr:0,kind:'d',d}))].sort((a,b)=>(a.ord-b.ord)||(a.cr-b.cr));
    body=combined.length?combined.map(it=>it.kind==='t'?cardHtml(it.t,true,true):divRowHtml(it.d)).join(''):`<div class="empty">Ingen oppgaver enda.</div>`;
  }else{
    const list=sorted(baseList());
    body=list.length?list.map(t=>cardHtml(t,manualDrag,true)).join(''):`<div class="empty">${sq.trim()?'Ingen treff på søket.':'Ingen treff med dette filteret.'}</div>`;
  }
  v.innerHTML=viewSeg+searchBar+`
    <div class="tiles">${tile('alle','Alle')}${todoTags().filter(t=>!t[4]).map(([k,l])=>tile(k,l)).join('')}${tile('fav','Favoritt')}</div>
    <div class="bar">
      <button class="chip ${s==='abc'?'on':''}" data-sort="abc">${svg('tag')}<span>Kategori</span></button>
      <button class="chip ${s==='az'?'on':''}" data-sort="az">A–Å</button>
      <button class="chip ${s==='dato'?'on':''}" data-sort="dato">${svg('cal')}<span>Frist</span></button>
      <button class="chip ${s==='nyeste'?'on':''}" data-sort="nyeste">Nyeste</button>
      <button class="chip ${s==='fav'?'on':''}" data-sort="fav">Favoritt</button>
      <button class="chip ${s==='egen'?'on':''}" data-sort="egen">${svg('grip')}<span>Egen</span></button>
      <button class="chip ${getHide()?'on':''}" data-hide>Skjul fullførte</button>
    </div>
    ${catDrag?`<div class="draghint">${svg('grip')}Dra et kort inn i en annen kategori for å flytte det dit.</div>`:''}
    ${manualDrag?`<div class="manrow"><button class="chip adddiv" data-adddiv>${svg('plus')}<span>Skillelinje</span></button><span class="manhint">${svg('grip')}Dra opp/ned${s!=='egen'?' — låser rekkefølgen':''}</span></div>`:''}
    ${body}
    <div class="build">TettPå iPhone · build ${BUILD_NO} · ${BUILD_DATE}</div>`;
  if(catDrag)wireDrag(v,'cat');
  else if(manualDrag)wireManualDrag(v,s!=='egen');
  wireSearch();
}
function renderSyncTab(){
  document.getElementById('view').innerHTML=`<div class="empty" style="padding:28px 16px">${svg('refresh')}<div style="font-weight:600;color:var(--ink);margin-bottom:4px">Synk</div><div style="font-size:13px">Panelet åpnes automatisk.</div></div>`;
}
function render(){
  renderWarn();
  renderHeader();
  renderTabbar();
  if(tab==='hjem')renderHome();
  else if(tab==='liste')renderList();
  else renderSyncTab();
}

/* ---------- HENDELSER ---------- */
document.getElementById('view').addEventListener('click',e=>{
  if(e.target.closest('[data-stop]'))return;
  const t=e.target.closest('[data-goto],[data-view],[data-calnav],[data-calday],[data-filter],[data-sort],[data-hide],[data-done],[data-fav],[data-edit],[data-boardpick],[data-searchclear],[data-calmode],[data-weeknav],[data-daynav],[data-calday-toggle],[data-theme],[data-namesheet],[data-scgo],[data-scedit],[data-scaddopen],[data-scdel],[data-scadd],[data-adddiv],[data-divedit],[data-divdel]');
  if(!t)return;
  const d=t.dataset;
  if(d.boardpick!==undefined){boardPick(Number(d.boardpick));return;}
  if(d.searchclear!==undefined){db.meta.search='';save();render();return;}
  if(d.calmode!==undefined){db.meta.calMode=d.calmode;save();render();return;}
  if(d.weeknav!==undefined){const a=parseYmd(weekAnchor());if(d.weeknav==='today')db.meta.calWeekAnchor=ymd(mondayOf(new Date()));else{a.setDate(a.getDate()+(d.weeknav==='next'?7:-7));db.meta.calWeekAnchor=ymd(a);}save();render();return;}
  if(d.daynav!==undefined){if(!db.meta.calDay)db.meta.calDay=ymd(new Date());if(d.daynav==='today')db.meta.calDay=ymd(new Date());else{const dd=parseYmd(db.meta.calDay);dd.setDate(dd.getDate()+(d.daynav==='next'?1:-1));db.meta.calDay=ymd(dd);}save();render();return;}
  if(d.caldayToggle!==undefined){const i=Number(d.caldayToggle);const arr=calDays();const k=arr.indexOf(i);if(k>=0)arr.splice(k,1);else arr.push(i);arr.sort((a,b)=>a-b);db.meta.calDays=arr;save();render();return;}
  if(d.theme!==undefined){setTheme(d.theme);return;}
  if(d.namesheet!==undefined){nameSheet();return;}
  if(d.scgo!==undefined){const sc=homeScMeta(d.scgo);if(sc){homeEdit=false;sc.run();}return;}
  if(d.scedit!==undefined){homeEdit=!homeEdit;render();return;}
  if(d.scaddopen!==undefined){homeEdit=true;render();return;}
  if(d.scdel!==undefined){db.meta.homeShortcuts=getHomeShortcuts().filter(x=>x!==d.scdel);save();render();return;}
  if(d.scadd!==undefined){const l=getHomeShortcuts();if(!l.includes(d.scadd)){l.push(d.scadd);save();}render();return;}
  if(d.goto){db.meta.filter=d.goto;save();tab='liste';render();window.scrollTo(0,0);return;}
  if(d.view){db.meta.view=d.view;save();render();return;}
  if(d.calday){todoSheet(null,{date:d.calday});return;}
  if(d.calnav){const cur=getCalMonth();let Y=Number(cur.slice(0,4)),M=Number(cur.slice(5,7));if(d.calnav==='today'){const n=new Date();db.meta.calMonth=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0');}else{M+=(d.calnav==='next'?1:-1);if(M<1){M=12;Y--;}else if(M>12){M=1;Y++;}db.meta.calMonth=Y+'-'+String(M).padStart(2,'0');}save();render();return;}
  if(d.filter){db.meta.filter=d.filter;save();render();return;}
  if(d.sort){db.meta.sort=d.sort;save();render();return;}
  if(d.hide!==undefined){db.meta.hideDone=!db.meta.hideDone;save();render();return;}
  if(d.done){const x=db.todos.find(y=>y.id===d.done);if(x){x.done=!x.done;x.updated=Date.now();save();render();}return;}
  if(d.fav){const x=db.todos.find(y=>y.id===d.fav);if(x){x.fav=!x.fav;x.updated=Date.now();save();render();}return;}
  if(d.edit){todoSheet(d.edit);return;}
  if(d.adddiv!==undefined){addDivider();return;}
  if(d.divedit){divEdit(d.divedit);return;}
  if(d.divdel){divDelete(d.divdel);return;}
});
document.getElementById('tabbar').addEventListener('click',e=>{
  const b=e.target.closest('[data-tab]');if(!b)return;
  tab=b.dataset.tab;
  if(tab==='synk'){render();renderSync();return;}
  render();
});
document.getElementById('hdr').addEventListener('click',e=>{
  if(e.target.closest('#greetBtn')){nameSheet();return;}
  if(e.target.closest('#catBtn')){openCatSheet();return;}
  if(e.target.closest('#addBtn')){todoSheet(null);return;}
});
load().then(()=>{applyTheme();db.meta.search='';normalizeCats();render();startClock();});
</script>
