html,body{margin:0;padding:0}

.abctab-expl .e{display:inline-flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:11.5px;font-weight:600}
.abctab-expl .bb{width:19px;height:19px;border-radius:6px;color:#fff;font-weight:800;font-size:10.5px;display:inline-flex;align-items:center;justify-content:center}
.abcg{margin-bottom:12px}
.abcg-h{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:11px 11px 0 0;color:#fff;font-weight:700;font-size:12.5px}
.abcg-h .bb{width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,.25);font-weight:800;font-size:11.5px;display:inline-flex;align-items:center;justify-content:center}
.abcg-h .c{margin-left:auto;background:rgba(255,255,255,.25);border-radius:10px;padding:1px 9px;font-size:10.5px}
.abcg-b{border:2px solid;border-top:none;border-radius:0 0 11px 11px;background:var(--paper);padding:5px 11px}
.abcrow{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--line-soft);font-size:12px}
.abcrow:last-child{border-bottom:none}
.abcchk{width:20px;height:20px;border:1.5px solid var(--muted-2);border-radius:6px;background:var(--paper);flex:0 0 auto}

.abcsw{display:inline-flex;gap:3px}
.abcsw button{width:20px;height:20px;border-radius:6px;font-size:9.5px;font-weight:800;border:1.5px solid var(--line);color:var(--muted);background:var(--paper);font-family:inherit;display:inline-flex;align-items:center;justify-content:center;padding:0}
.abcsw button.on{color:#fff;border-color:transparent}
.abclsw{display:inline-flex;gap:2px;flex:0 0 auto;margin-left:4px}
.abclsw button{width:20px;height:20px;border-radius:5px;font-size:10px;font-weight:800;border:1.2px solid var(--line);color:var(--muted);background:var(--paper);padding:0;font-family:inherit;display:inline-flex;align-items:center;justify-content:center}
.abclsw button.on{color:#fff;border-color:transparent}
.td-prio{background:var(--paper);border:2px solid var(--petrol);border-radius:12px;padding:10px 12px;margin:0 0 12px}
.td-prio .cap{display:flex;align-items:center;gap:7px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--petrol);margin-bottom:8px}
.td-prio .cap>svg{width:14px;height:14px;flex:0 0 auto}
.ncsep{width:1px;height:20px;background:var(--line);margin:0 2px}
.tpprint-ov{position:fixed;inset:0;background:rgba(10,30,36,.5);display:flex;align-items:center;justify-content:center;z-index:260;padding:14px}
.tpprint{background:var(--paper);border-radius:14px;box-shadow:0 18px 50px rgba(0,0,0,.35);width:min(560px,96vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.tpprint-h{background:var(--petrol);color:#fff;padding:10px 13px;font-weight:800;font-size:13.5px;display:flex;align-items:center;gap:8px}
.tpprint-h svg{width:15px;height:15px}
.tpprint-h .x{margin-left:auto;background:rgba(255,255,255,.22);border:none;color:#fff;border-radius:7px;width:26px;height:26px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.tpprint-h .x svg{width:14px;height:14px}
.tpprint-chips{display:flex;gap:5px;padding:9px 11px 0;flex-wrap:wrap}
.tpprint-chips .vchip{border:1.5px solid var(--line);background:var(--paper);border-radius:8px;padding:4px 10px;font-size:10.5px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)}

.tpprint-f .pbtn.pri{background:var(--petrol);border-color:var(--petrol);color:#fff;margin-left:auto}

.tpsheet h1{font-size:18px;margin:0 0 4px;color:#0e5b61}
.tpsheet .ph{border-bottom:2px solid #0e5b61;padding-bottom:7px;margin-bottom:11px}
.tpsheet .sub{font-size:10px;color:#5f6f6a}

.tpsheet .plain{line-height:1.6}

.tpsheet .pk{display:flex;align-items:center;gap:10px;padding:6px 2px;border-bottom:1px solid #e8edeb}
.tpsheet .bx{width:14px;height:14px;border:1.5px solid #777;border-radius:4px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-size:9px}
.tpsheet .pk.done .bx{background:#2f8f5b;border-color:#2f8f5b;color:#fff}
.tpsheet .pk.done .t{text-decoration:line-through;color:#5f6f6a}
.tpsheet .pdv{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#0a4a4f;display:flex;align-items:center;gap:8px;padding:10px 0 3px}
.tpsheet .pdv .l{flex:1;height:1px;background:#dde4e1}
.tpsheet .nrow{padding:5px 0;border-bottom:1px solid #e8edeb}

.tpsheet .abc{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:5px;color:#fff;font-size:9px;font-weight:800;vertical-align:-4px;margin-right:5px}

.ncol{width:19px;height:19px;border-radius:50%;padding:0;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--line);cursor:pointer;flex:0 0 auto}

.td-etab{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;color:var(--ink);white-space:nowrap}

.td-prio-btns{display:flex;gap:7px;flex-wrap:wrap}
.td-pbtn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:var(--paper);border-radius:10px;padding:7px 12px;font-size:12.5px;font-weight:700;font-family:inherit;color:var(--muted)}
.td-pbtn.on{color:#fff}
.td-pbtn .bb{width:19px;height:19px;border-radius:6px;color:#fff;font-weight:800;font-size:10.5px;display:inline-flex;align-items:center;justify-content:center}
.td-pbtn-add{border-style:dashed;color:var(--petrol)}

/* Kolonner: maks kompakt (sist i arket = vinner) */
.kol-frame.kol-frame{padding:4px}
.kol-frame.kol-frame .kol-lines{gap:1px}
.kol-frame.kol-frame .kol-cols{column-gap:4px}
.kol-frame.kol-frame .card.compact,.kol-frame.kol-frame .kol-card{padding:var(--panel-pad,2px) 6px;gap:5px;margin-bottom:1px;border-radius:5px;align-items:center}
.kol-frame.kol-frame .kol-card{margin:0 0 1px}
.kol-frame.kol-frame .chk{width:13px;height:13px;border-width:1.5px;border-radius:4px}
.kol-frame.kol-frame .chk.on::after{left:4px;top:1px;width:3px;height:7px;border-width:0 1.5px 1.5px 0}
.kol-frame.kol-frame .gbox{width:13px;height:13px;border-radius:4px}
.kol-frame.kol-frame .gbox svg{width:9px;height:9px}
.kol-frame.kol-frame .grip{padding:1px 2px}
.kol-frame.kol-frame .grip svg{width:12px;height:12px}
.kol-frame.kol-frame .divrow{margin:0;padding:0;gap:5px}
.kol-frame.kol-frame .divline{height:1.5px}
.kol-frame.kol-frame .divrow .ib{padding:2px}
.kol-frame.kol-frame .divrow .ib svg{width:13px;height:13px}
.kol-frame.kol-frame .divtx{font-size:11px}

.th-seg .segsep{margin:0 3px;height:18px;flex:0 0 auto;align-self:center}

/* Feltrad B: etiketter ved siden av, én lav linje */
.kol-dd2.kol-dd2{padding:4px 5px;gap:6px;align-items:center;border-radius:9px;margin-bottom:5px}
.kol-dd2.kol-dd2 .kol-f{flex:1;min-width:0;flex-direction:row;align-items:center;gap:5px}
.kol-dd2.kol-dd2 .kol-ddl{font-size:8.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex:0 0 auto}
.kol-dd2.kol-dd2 select{flex:1;min-width:0;width:auto;height:24px;border-radius:6px;padding:0 7px;font-size:11.5px}
.kol-dd2.kol-dd2 .kol-markf{flex:0 0 auto;display:flex;align-items:center}
.kol-dd2.kol-dd2 .kol-mark-bar{width:auto}
.kol-dd2.kol-dd2 .kol-markf .chip[data-kolmark]{flex:0 0 auto;height:24px;border-radius:6px;padding:0 10px;font-size:11.5px}
.kol-combo{position:relative;flex:1;min-width:0;display:flex;align-items:center}
.kol-cin{width:100%;min-width:0;box-sizing:border-box;height:24px;background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:0 20px 0 7px;font-family:inherit;font-size:12px;color:var(--ink)}
.kol-cin:focus{outline:none;border-color:var(--petrol);font-size:16px;height:28px}
.kol-combo.has .kol-cin{font-weight:700;border-color:var(--petrol);background:var(--petrol-050,#e7f1f1)}
.kol-cx{position:absolute;right:1px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--muted);font-size:15px;line-height:1;cursor:pointer;padding:2px 6px;display:none}
.kol-combo.has .kol-cx{display:block}
.kol-cdd{position:absolute;left:0;right:0;top:calc(100% + 3px);z-index:80;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;box-shadow:0 8px 22px rgba(0,0,0,.16);max-height:200px;overflow:auto;padding:3px;-webkit-overflow-scrolling:touch}
.kol-cdd[hidden]{display:none}
.kol-ci{padding:7px 9px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:7px}
.kol-ci.on{background:var(--petrol);color:#fff}
.kol-ci.none{color:var(--muted);font-style:italic}
.kol-cit{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kol-cic,.kol-cnt{background:var(--petrol);color:#fff;border-radius:9px;min-width:19px;height:15px;padding:0 5px;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.kol-cic.zero,.kol-cnt.zero{background:#c7d3d6;color:#5c6b70}
.kol-ci.on .kol-cic{background:rgba(255,255,255,.32);color:#fff}
.kol-cnt{position:absolute;top:50%;transform:translateY(-50%);right:5px;pointer-events:none}
.kol-combo.has .kol-cnt{right:19px}
.kol-combo:not(.has) .kol-cin{padding-right:30px}
.kol-combo.has .kol-cin{padding-right:44px}
.kol-combo:focus-within .kol-cnt{display:none}
.kol-combo:focus-within .kol-cin{padding-right:20px}
/* Verktøy-grupper */
.tools-grp{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:7px 0 6px}
.tools-grp+.tools-grp{border-top:1.5px dashed #a8bcb8}
.tg-lbl{flex:0 0 56px;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#5c6b70}
.tools-grp .kol-dd2.kol-dd2{flex:1;min-width:0;margin:0;border:none;background:transparent;padding:0}
/* Når/Kat/Søk-knapper */
.dg-frame{display:flex;gap:6px}
.op-frame.dg-frame{padding:6px 7px}
.dg-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;border:1.5px solid var(--line);background:var(--paper);border-radius:8px;padding:7px 8px;font-size:11.5px;font-weight:800;font-family:inherit;color:var(--ink);min-width:0;cursor:pointer}
.dg-btn svg{width:13px;height:13px;flex:0 0 auto}
.dg-btn>span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dg-btn.dg-naar{border-color:var(--amber);color:#8a5210}
.dg-btn.dg-naar.on{background:var(--amber);border-color:var(--amber);color:#fff}
.dg-btn.dg-kat{border-color:var(--green);color:#1d5c3a}
.dg-btn.dg-kat.on{background:var(--green);border-color:var(--green);color:#fff}
.dg-btn.dg-sok{flex:0 1 auto;border-color:var(--petrol);color:var(--petrol);padding:7px 11px}
.dg-btn.dg-sok.act{background:var(--petrol);color:#fff}
.dg-gear{margin-left:2px;opacity:.75;display:inline-flex;flex:0 0 auto}
.dg-gear svg{width:11px;height:11px}
.dg-x{margin-left:3px;display:inline-flex;opacity:.85;flex:0 0 auto}
.dg-x svg{width:11px;height:11px}
/* pop-up (Når/Kat-valg + søk) */
.dgp-ov{position:fixed;inset:0;background:rgba(13,40,46,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:56px 16px 20px}
.dgp{background:var(--paper);border:2px solid var(--petrol);border-radius:14px;box-shadow:0 18px 40px rgba(0,0,0,.35);padding:9px 10px;width:100%;max-width:380px;max-height:80vh;overflow:auto}
.dgp-h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:800;color:var(--petrol);margin-bottom:3px}
.dgp-h svg{width:15px;height:15px}
.dgp-x{margin-left:auto;border:none;background:none;color:var(--muted);padding:4px;display:inline-flex;cursor:pointer}
.dgp-x svg{width:15px;height:15px}
.dgp-sect{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--petrol);margin:6px 0 3px}
.dgp-opt{display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);border-radius:8px;padding:4px 9px;margin-bottom:3px;font-size:11.5px;font-weight:700;cursor:pointer;min-height:27px}
.dgp-opt.sel{border-color:var(--amber);background:rgba(217,131,36,.12)}
.dgp-rad{width:12px;height:12px;border:2px solid var(--line);border-radius:50%;flex:0 0 auto;position:relative}
.dgp-opt.sel .dgp-rad{border-color:var(--amber)}
.dgp-opt.sel .dgp-rad::after{content:'';position:absolute;inset:2px;border-radius:50%;background:var(--amber)}
.dgp.katm .dgp-opt.sel{border-color:var(--green);background:rgba(47,143,91,.12)}
.dgp.katm .dgp-opt.sel .dgp-rad{border-color:var(--green)}
.dgp.katm .dgp-opt.sel .dgp-rad::after{background:var(--green)}
.dgp-bb{width:14px;height:14px;border-radius:4px;color:#fff;font-size:8.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.dgp-ol{flex:1;min-width:0;display:inline-flex;align-items:center;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dgp-ol svg{width:12px;height:12px}
.dgp-cnt{background:var(--petrol);color:#fff;border-radius:9px;min-width:19px;height:15px;padding:0 5px;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.dgp-cnt.zero{background:#c7d3d6;color:#5c6b70}
.dgp-ok{width:100%;background:var(--petrol);color:#fff;border:none;border-radius:8px;padding:7px 0;font-size:11.5px;font-weight:800;font-family:inherit;margin-top:4px;cursor:pointer}
.dgp-s{margin-bottom:8px}
.dgp-hits{min-height:40px}
.dgp-cntx{font-size:10.5px;color:var(--muted);margin:4px 2px 5px}
.dgp-r{border:1.5px solid var(--line);border-radius:8px;padding:4px 9px;margin-bottom:3px;font-size:11.5px;font-weight:700}
.dgp-none{font-size:11px;color:var(--muted);font-style:italic;padding:4px 2px}
.dgp-btns{display:flex;gap:6px;margin-top:8px}
.dgp-b{flex:1;border:1.5px solid var(--line);background:var(--paper);border-radius:9px;padding:8px 0;font-size:11.5px;font-weight:800;font-family:inherit;color:var(--muted);cursor:pointer}
.dgp-b.ok{background:var(--petrol);border-color:var(--petrol);color:#fff}
/* Rediger ToDo – seksjoner */
.td-sect{border:1.5px solid var(--line);border-radius:11px;padding:9px 10px;margin-bottom:9px}
.td-sect-h{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--petrol);margin-bottom:7px}
.td-sect-h svg{width:13px;height:13px}
.td-sect-cnt{background:var(--petrol);color:#fff;border-radius:9px;min-width:20px;height:15px;padding:0 6px;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.td-sect-r{margin-left:auto;display:flex;gap:4px}
.ib2{width:26px;height:26px;border:1.5px solid var(--line);border-radius:7px;background:var(--paper);display:inline-flex;align-items:center;justify-content:center;color:var(--petrol);flex:0 0 auto}
.ib2 svg{width:13px;height:13px}
.td-sectempty{font-size:11.5px;color:var(--muted);font-style:italic;padding:2px 0}
.td-addrow{display:flex;align-items:center;gap:7px;border:1.5px dashed var(--petrol);background:var(--petrol-050);border-radius:9px;padding:8px 10px;margin-top:8px}
.td-addplus{display:inline-flex;color:var(--petrol)}
.td-addplus svg{width:13px;height:13px}
.td-addrow input{flex:1;border:none;background:transparent;font-family:inherit;font-size:13px;color:var(--ink);outline:none;min-width:0;padding:0}
#tdAbc.td-prio-btns,#tdKat.td-prio-btns,#tdTags.td-prio-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.td-katsel{margin-left:auto;background:var(--petrol-050);color:var(--petrol);border-radius:7px;padding:2px 8px;font-size:9.5px;font-weight:800;text-transform:none;letter-spacing:0}
.td-secthint{font-size:11px;color:var(--muted);margin-top:7px}
.tagpc svg{width:13px;height:13px;color:var(--tc);flex:0 0 auto}
.td-pc.tagpc.on{border-width:2px;border-color:var(--tc);background:var(--petrol-050)}
.td-pc{display:flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:var(--paper);border-radius:8px;padding:7px 9px;font-size:12px;font-weight:700;font-family:inherit;color:var(--ink);min-width:0;cursor:pointer}
.td-pc .bb{width:17px;height:17px;border-radius:4px;color:#fff;font-size:9.5px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.td-pc>span:last-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-pc.on{border-width:2px;border-color:var(--petrol);background:var(--petrol-050)}
.td-pc.td-pc-add{border-style:dashed;color:var(--muted);justify-content:center}
.pcnone{color:var(--muted);font-weight:800;flex:0 0 auto}
.td-favrow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.td-favbtn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line);background:var(--paper);color:var(--muted);border-radius:9px;padding:8px 13px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer}
.td-favbtn svg{width:13px;height:13px}
.td-favbtn.on{border:2px solid var(--amber);background:rgba(217,131,36,.12);color:#8a5210;font-weight:800}
.td-favbtn.on svg{color:var(--amber)}
.td-favhint{font-size:10.5px;color:var(--muted)}
/* Timer-fanen */
.tm-wrap{padding:2px 0}
.tm-sect{background:var(--paper)}
.tm-wrap #tmDate,.tm-wrap #tmDesc,.tm-wrap #tmProj,.tm-wrap #tmHours{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--paper);color:var(--ink);font-family:inherit;font-size:16px;box-sizing:border-box}
.tm-hrow{display:flex;align-items:center;gap:8px;margin-top:8px}
.tm-hrow input{flex:1;font-weight:800}
.tm-hlbl{font-size:12px;color:var(--muted);font-weight:700;flex:0 0 auto}
.tm-save{width:100%;margin-top:9px;background:var(--petrol);color:#fff;border:none;border-radius:10px;padding:12px 0;font-size:13.5px;font-weight:800;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.tm-save svg{width:14px;height:14px}
.tm-sumrow{display:flex;gap:6px}
.tm-sumc{flex:1;background:var(--petrol-050);border-radius:10px;padding:8px 4px;text-align:center}
.tm-sumc b{display:block;font-size:16px;color:var(--petrol)}
.tm-sumc span{font-size:8.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tm-row{display:flex;align-items:center;gap:7px;padding:5px 2px;border-bottom:1px dashed #cfdad6;font-size:12px;font-weight:600}
.tm-row:last-of-type{border-bottom:none}
.tm-h{background:var(--petrol-050);color:var(--petrol);border-radius:6px;padding:1px 7px;font-size:10.5px;font-weight:800;flex:0 0 auto}
.tm-t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tm-d{color:var(--muted);font-size:10px;flex:0 0 auto}
.tm-del{color:var(--red)}
/* Kompakt Hjem */
.ov-sect{margin-bottom:7px;padding:9px 11px}
.ov-toprow{display:flex;align-items:center;gap:11px}
.ov-time{font-size:24px;font-weight:800;color:var(--petrol);letter-spacing:.5px;line-height:1;font-variant-numeric:tabular-nums}

.ov-date{font-size:12px;font-weight:700;color:var(--ink)}

.ov-sect .hgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:0}

.ov-sect .hsc-l{font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ov-q{margin:0}
.ov-sync{margin-top:7px;padding:0;border:none;background:none}
.td-qdrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.td-qb{display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--petrol);color:var(--petrol);background:var(--petrol-050);border-radius:8px;padding:7px 11px;font-size:11.5px;font-weight:800;font-family:inherit;cursor:pointer}

.td-qb.sec{border-color:var(--line);background:var(--paper);color:var(--ink);font-weight:700}

.kol-doneline{flex:1;height:1.5px;border-radius:2px;background:rgba(14,91,97,.35)}
.kol-donetx{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);white-space:nowrap;flex:0 0 auto}

.td-daylist.td-daylist .chk.on::after{left:4px;top:1px;width:3px;height:7px;border-width:0 1.5px 1.5px 0}
.td-daylist.td-daylist .gbox{width:13px;height:13px;border-radius:4px}
.td-daylist.td-daylist .gbox svg{width:9px;height:9px}
.td-daylist.td-daylist .grip{padding:1px 2px}

/* ---------- LAGRING: IndexedDB -> localStorage -> minne ---------- */
const DB_KEY='tettpa-todo-iphone';
let db={todos:[],todoDeleted:[],meta:{}};
let storeMode='minne', idb=null;
function openIdb(){
  return new Promise(res=>{
    if(!('indexedDB' in window))return res(null);
    let req;
    try{req=indexedDB.open(DB_KEY,1);}catch(e){return res(null);}
    req.onupgradeneeded=()=>{try{req.result.createObjectStore('kv');}catch(e){}};
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>res(null);
    setTimeout(()=>res(null),2500);
  });
}
function idbGet(){
  return new Promise(res=>{
    if(!idb)return res(null);
    try{const r=idb.transaction('kv','readonly').objectStore('kv').get('state');
      r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);}catch(e){res(null);}
  });
}
function idbPut(v){
  return new Promise(res=>{
    if(!idb)return res(false);
    try{const r=idb.transaction('kv','readwrite').objectStore('kv').put(v,'state');
      r.onsuccess=()=>res(true);r.onerror=()=>res(false);}catch(e){res(false);}
  });
}
async function load(){
  idb=await openIdb();
  if(idb){const v=await idbGet();if(v){db=Object.assign(db,v);}storeMode='idb';return;}
  try{const raw=localStorage.getItem(DB_KEY);if(raw)db=Object.assign(db,JSON.parse(raw));
    localStorage.setItem(DB_KEY+'-probe','1');localStorage.removeItem(DB_KEY+'-probe');
    storeMode='local';return;}catch(e){}
  storeMode='minne';
}
function save(){
  if(!Array.isArray(db.todos))db.todos=[];
  if(!Array.isArray(db.todoDeleted))db.todoDeleted=[];
  if(storeMode==='idb'){idbPut(db);return;}
  if(storeMode==='local'){try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){storeMode='minne';renderWarn();}return;}
}
function renderWarn(){
  const el=document.getElementById('warnbar');
  if(storeMode==='minne'){
    el.className='warnbar';
    el.innerHTML=`${svg('warn')}<div><b>Ingen lagring tilgjengelig.</b> Data forsvinner når du lukker fanen. Eksporter synkfilen før du går ut — eller legg appen på en nettadresse.</div>`;
  }else el.innerHTML='';
}

/* ---------- SYNK (identisk logikk som TettPå 2.0) ---------- */
const TODO_SYNC_APP='TettPaa-ToDo', TODO_SYNC_VER=1, TODO_TOMB_MS=90*864e5, TODO_SOURCE='iPhone';
function todoSyncStamp(d){const p=n=>String(n).padStart(2,'0');d=d||new Date();return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'_'+p(d.getHours())+p(d.getMinutes());}
function todoSyncFilename(withImages){return 'TettPaa-fra-iphone-til-mac-versjon'+BUILD_NO+'-'+todoSyncStamp()+(withImages?'-med-bilder':'-uten-bilder')+'.json';}
function todoSyncWhen(ts){if(!ts)return '';const d=new Date(ts);if(isNaN(d))return '';return d.toLocaleDateString('nb-NO',{day:'numeric',month:'long'})+' kl. '+d.toTimeString().slice(0,5);}
function todoMergeData(localTodos,localDel,inTodos,inDel){
  const now=Date.now();
  const delMap={};
  [].concat(localDel||[],inDel||[]).forEach(d=>{if(d&&d.id){const at=d.deletedAt||0;if(!delMap[d.id]||at>delMap[d.id])delMap[d.id]=at;}});
  const map={};
  (localTodos||[]).forEach(t=>{if(t&&t.id)map[t.id]=t;});
  let added=0,updated=0,removed=0,unchanged=0;
  (inTodos||[]).forEach(t=>{
    if(!t||!t.id)return;
    const cur=map[t.id];
    if(!cur){map[t.id]=t;added++;return;}
    if((t.updated||0)>(cur.updated||0)){
      const o=Object.assign({},t);
      if(!('image' in t)&&cur.image)o.image=cur.image;
      map[t.id]=o;updated++;
    }else unchanged++;
  });
  Object.keys(delMap).forEach(id=>{
    const t=map[id];
    if(t&&(t.updated||0)<=delMap[id]){delete map[id];removed++;}
  });
  const deleted=Object.keys(delMap)
    .filter(id=>(now-delMap[id])<TODO_TOMB_MS&&!map[id])
    .map(id=>({id,deletedAt:delMap[id]}));
  return {todos:Object.keys(map).map(k=>map[k]),deleted,stats:{added,updated,removed,unchanged}};
}
function todoSyncPayload(withImages){
  const todos=(db.todos||[]).map(t=>{
    const c=Object.assign({},t);
    if(!withImages)delete c.image;
    if(!c.updated)c.updated=c.created||Date.now();
    return c;
  });
  const now=Date.now();
  const deleted=(db.todoDeleted||[]).filter(d=>(now-(d.deletedAt||0))<TODO_TOMB_MS);
  const _timeArr=(db.time||[]).map(e=>{const c=Object.assign({},e);if(!c.updated)c.updated=c.created||0;return c;});
  const _timeDel=(db.timeDeleted||[]).filter(x=>(now-(x.deletedAt||0))<TODO_TOMB_MS);
  return {app:TODO_SYNC_APP,version:TODO_SYNC_VER,source:TODO_SOURCE,exportedAt:now,withImages:!!withImages,cats:(db.todoCats||[]).map(c=>c.slice()),abcCats:abcCats().map(c=>c.slice()),tags:(db.todoTags||[]).map(t=>t.slice()),dividers:(db.todoDividers||[]).map(d=>({id:d.id,label:d.label,ord:d.ord,tile:d.tile||null,num:d.num!=null?d.num:null,abc:d.abc||null,mtime:d.mtime})),layout:{tiles:db.meta.todoHomeTiles||null,cats:db.meta.todoHomeCats||null,mode:db.meta.todoHomeMode||null,tileSize:db.meta.todoHomeTileSize||null,panelTextSize:db.meta.todoPanelTextSize||null,panelRowPad:db.meta.todoPanelRowPad||null,listMode:db.meta.todoListMode||null,numSort:!!db.meta.todoPanelNumSort,hideDone:!!db.meta.todoPanelHideDone,divText:db.meta.todoDivShowText,divEdit:db.meta.todoDivShowEdit,divDel:db.meta.todoDivShowDel,icons:db.meta.todoHomeIcons!==false},time:_timeArr,timeDeleted:_timeDel,todos,deleted};
}
let syncResult='', syncFrom='';
function todoSyncExport(withImages){
  try{
    const data=JSON.stringify(todoSyncPayload(withImages),null,1);
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=todoSyncFilename(withImages);
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    db.meta.todoLastSync=Date.now();save();
    toast('Synkfil eksportert'+(withImages?' (med bilder)':' (uten bilder)'));
    renderSync();
  }catch(e){toast('Kunne ikke eksportere.');}
}
function todoSyncApply(raw){
  let d;
  try{d=JSON.parse(raw);}catch(e){toast('Filen er ikke gyldig JSON.');return;}
  if(!d||d.app!==TODO_SYNC_APP||!Array.isArray(d.todos)){toast('Dette er ikke en TettPå ToDo-synkfil.');return;}
  if((d.version||1)>TODO_SYNC_VER){toast('Filen er laget av en nyere versjon.');return;}
  const r=todoMergeData(db.todos||[],db.todoDeleted||[],d.todos,d.deleted||[]);
  if(Array.isArray(d.cats)&&d.cats.length){
    if(!Array.isArray(db.todoCats))db.todoCats=[];
    d.cats.forEach(c=>{if(!Array.isArray(c)||!c[0])return;const ex=db.todoCats.find(x=>x[0]===c[0]);if(!ex){db.todoCats.push(c.slice());}else{const im=c[3]||0;if(im>(ex[3]||0)){ex[1]=c[1];ex[2]=c[2];ex[3]=im;}}});
  }
  if(Array.isArray(d.abcCats)&&d.abcCats.length){
    abcCats();
    d.abcCats.forEach(c=>{if(!Array.isArray(c)||!c[0])return;const ex=db.abcCats.find(x=>x[0]===c[0]);if(!ex){db.abcCats.push(c.slice());}else{const im=c[3]||0;if(im>(ex[3]||0)){ex[1]=c[1];ex[2]=c[2];ex[3]=im;}}});
  }
  if(Array.isArray(d.tags)&&d.tags.length){
    if(!Array.isArray(db.todoTags))db.todoTags=[];
    d.tags.forEach(t=>{if(!Array.isArray(t)||!t[0])return;const ex=db.todoTags.find(x=>x[0]===t[0]);if(!ex){db.todoTags.push(t.slice());}else{const im=t[5]||0;if(im>(ex[5]||0)){ex[1]=t[1];ex[2]=t[2];ex[3]=t[3];ex[4]=t[4];ex[5]=im;ex[6]=t[6];}}});
  }
  if(Array.isArray(d.dividers)&&d.dividers.length){
    if(!Array.isArray(db.todoDividers))db.todoDividers=[];
    d.dividers.forEach(x=>{if(!x||!x.id)return;const ex=db.todoDividers.find(y=>y.id===x.id);if(!ex){db.todoDividers.push({id:x.id,label:x.label||'Skillelinje',ord:x.ord,tile:x.tile||null,num:x.num!=null?x.num:null,abc:x.abc||'',mode:x.mode||null,mtime:x.mtime||0});}else{const im=x.mtime||0;if(im>(ex.mtime||0)){ex.label=x.label||'Skillelinje';ex.ord=x.ord;ex.tile=x.tile||null;ex.num=x.num!=null?x.num:null;ex.abc=x.abc||'';ex.mtime=im;}}});
  }
  db.todos=r.todos;db.todoDeleted=r.deleted;db.meta.todoLastSync=Date.now();
  db.todos.forEach(t=>{if(t.prio===undefined)t.prio=t.abc||'';});
  if(d.layout){const L=d.layout;if(Array.isArray(L.tiles))db.meta.todoHomeTiles=L.tiles.slice();if(Array.isArray(L.cats))db.meta.todoHomeCats=L.cats.slice();if(L.mode)db.meta.todoHomeMode=L.mode;if(L.tileSize)db.meta.todoHomeTileSize=L.tileSize;if(L.panelTextSize)db.meta.todoPanelTextSize=L.panelTextSize;if(L.panelRowPad)db.meta.todoPanelRowPad=L.panelRowPad;if(L.listMode)db.meta.todoListMode=L.listMode;if(L.numSort!==undefined)db.meta.todoPanelNumSort=L.numSort;if(L.hideDone!==undefined)db.meta.todoPanelHideDone=L.hideDone;if(L.divText!==undefined)db.meta.todoDivShowText=L.divText;if(L.divEdit!==undefined)db.meta.todoDivShowEdit=L.divEdit;if(L.divDel!==undefined)db.meta.todoDivShowDel=L.divDel;if(L.icons!==undefined)db.meta.todoHomeIcons=L.icons;}
  if(Array.isArray(d.time)||Array.isArray(d.timeDeleted)){
    if(!Array.isArray(db.time))db.time=[];
    if(!Array.isArray(db.timeDeleted))db.timeDeleted=[];
    (Array.isArray(d.time)?d.time:[]).forEach(x=>{if(!x||!x.id)return;const ex=db.time.find(y=>y.id===x.id);if(!ex){db.time.push(Object.assign({},x));}else{const im=x.updated||x.created||0;if(im>(ex.updated||ex.created||0))Object.assign(ex,x);}});
    const _dm={};db.timeDeleted.forEach(t2=>{_dm[t2.id]=Math.max(_dm[t2.id]||0,t2.deletedAt||0);});(Array.isArray(d.timeDeleted)?d.timeDeleted:[]).forEach(t2=>{_dm[t2.id]=Math.max(_dm[t2.id]||0,t2.deletedAt||0);});
    db.time=db.time.filter(e=>{const da=_dm[e.id];return !(da&&(e.updated||e.created||0)<=da);});
    const _nw=Date.now();db.timeDeleted=Object.keys(_dm).filter(id2=>(_nw-_dm[id2])<TODO_TOMB_MS&&!db.time.some(e=>e.id===id2)).map(id2=>({id:id2,deletedAt:_dm[id2]}));
  }
  save();
  const s=r.stats;
  const src=d.source||'ukjent kilde';
  const when=todoSyncWhen(d.exportedAt);
  syncFrom=`Fra <b>${esc(src)}</b>${when?', eksportert '+esc(when):''}${d.withImages===false?' · uten bilder':''}`;
  syncResult=`${s.added} nye · ${s.updated} oppdatert · ${s.removed} slettet · ${s.unchanged} uendret`;
  toast('Flettet fra '+src+': '+syncResult);
  renderSync();
}
function todoSyncReplace(raw){
  let d;

function abcSortWithDividers(silent){
  const cs=abcCatsAlpha();
  const order=new Map(cs.map((c,i)=>[c[0],i]));
  const divs=todoDividers();
  const autoLabels=new Set(cs.map(c=>c[0]+' – '+c[1]));
  const seq=[...db.todos.map(t=>({k:'t',o:(t.ord==null?1e9:t.ord),cr:t.created||0,t})),
             ...divs.map(d=>({k:'d',o:(d.ord==null?1e9:d.ord),cr:d.mtime||0,d}))]
    .sort((a,b)=>(a.o-b.o)||(a.cr-b.cr));
  const rmIds=new Set();const anchors=[];const oldPos=new Map();
  const items=[];
  let prev=null,p=0;
  seq.forEach(it=>{
    if(it.k==='t'){items.push(it);prev='t:'+it.t.id;oldPos.set(it.t.id,p++);return;}
    if(autoLabels.has(it.d.label||'')){rmIds.add(it.d.id);prev='a:'+(it.d.label||'').split(' – ')[0];return;}
    if(it.d.abc&&order.has(it.d.abc)){items.push(it);prev='d:'+it.d.id;oldPos.set(it.d.id,p++);return;}
    anchors.push({d:it.d,after:prev});
  });
  const itKey=it=>it.k==='t'?prioMeta(it.t.prio||cs[0][0])[0]:it.d.abc;
  const itId=it=>it.k==='t'?it.t.id:it.d.id;
  const sorted=items.slice().sort((a,b)=>{
    const d=(order.get(itKey(a))||0)-(order.get(itKey(b))||0);if(d)return d;
    return (oldPos.get(itId(a))||0)-(oldPos.get(itId(b))||0);
  });
  const buildDry=()=>{
    const dry=[];const pl=new Set();
    anchors.forEach(a=>{if(!a.after){dry.push('d:'+a.d.id);pl.add(a.d.id);}});
    let dc=null;
    sorted.forEach(it=>{
      const k=itKey(it);
      const key=(it.k==='t'?'t:':'d:')+itId(it);
      if(k!==dc){dc=k;dry.push('a:'+k);anchors.forEach(a=>{if(a.after==='a:'+k&&!pl.has(a.d.id)){dry.push('d:'+a.d.id);pl.add(a.d.id);}});}
      dry.push(key);
      anchors.forEach(a=>{if(a.after===key&&!pl.has(a.d.id)){dry.push('d:'+a.d.id);pl.add(a.d.id);}});
    });
    anchors.forEach(a=>{if(!pl.has(a.d.id))dry.push('d:'+a.d.id);});
    return dry.join('|');
  };
  if(silent){
    const curSig=seq.map(it=>it.k==='t'?('t:'+it.t.id):(autoLabels.has(it.d.label||'')?('a:'+(it.d.label||'').split(' – ')[0]):('d:'+it.d.id))).join('|');
    if(curSig===buildDry())return;
  }
  db.todoDividers=divs.filter(d=>!rmIds.has(d.id));
  let n=0;const now=Date.now();
  const placed=new Set();
  const placeAfter=key=>{anchors.forEach(a=>{if(a.after===key&&!placed.has(a.d.id)){a.d.ord=n++;a.d.mtime=now;placed.add(a.d.id);}});};
  anchors.forEach(a=>{if(!a.after){a.d.ord=n++;a.d.mtime=now;placed.add(a.d.id);}});
  let cur=null;
  sorted.forEach(it=>{
    const k=itKey(it);
    if(k!==cur){cur=k;const m=cs.find(c=>c[0]===k)||cs[0];
      db.todoDividers.push({id:uid(),label:m[0]+' – '+m[1],ord:n++,tile:'kol',num:null,mtime:now});
      placeAfter('a:'+k);}
    if(it.k==='t'){it.t.ord=n++;it.t.updated=now;placeAfter('t:'+it.t.id);}
    else{it.d.ord=n++;it.d.mtime=now;placeAfter('d:'+it.d.id);}
  });
  anchors.forEach(a=>{if(!placed.has(a.d.id)){a.d.ord=n++;a.d.mtime=now;placed.add(a.d.id);}});
  db.meta.sort='egen';
  save();if(!silent)toast('Sortert A-B-C');
}

function sorted(list){

function renderSync(){
  const n=(db.todos||[]).length, dl=(db.todoDeleted||[]).length;
  const last=db.meta.todoLastSync?fdate(db.meta.todoLastSync):'aldri';
  let kb=0;try{kb=Math.round(JSON.stringify(todoSyncPayload(true)).length/1024);}catch(e){}
  sheetOpen('Synk',`
    <div class="stat">
      <div><span>ToDo</span><b>${n}</b></div>
      <div><span>Gravsteiner</span><b>${dl}</b></div>
      <div><span>Sist synkronisert</span><b>${last}</b></div>
      <div><span>Filstørrelse ca.</span><b>${kb} kB</b></div>
      <div><span>Lagring</span><b>${storeMode==='idb'?'IndexedDB':(storeMode==='local'?'localStorage':'kun minne ⚠️')}</b></div>
    </div>
    <div class="syncbtns">
      <button class="sbtn pri" data-exp="1">${svg('download')}<div><span class="tt">Eksporter med bilder</span><small>Full kopi · ${kb} kB</small></div></button>
      <button class="sbtn" data-exp="0">${svg('download')}<div><span class="tt">Eksporter uten bilder</span><small>Mindre fil · bilder beholdes lokalt</small></div></button>
      <label class="sbtn" id="impBtn" for="syncFile">${svg('upload')}<div><span class="tt">Importer &amp; flett</span><small>Velg synkfil fra Filer</small></div></label>
      <label class="sbtn" id="replBtn" for="replaceFile">${svg('refresh')}<div><span class="tt">Erstatt alt med denne fila</span><small>Ren import – ingen fletting</small></div></label>
    </div>
    <input type="file" id="syncFile" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden">
    <input type="file" id="replaceFile" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden">
    ${syncResult?`<div class="res">${syncFrom?syncFrom+'<br>':''}<b>Flettet:</b> ${esc(syncResult)}</div>`:''}
    <div style="font-size:11px;color:var(--muted);margin-top:8px;overflow-wrap:anywhere">Filnavn: <code>${esc(todoSyncFilename(true))}</code></div>
    <div style="font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.55">Nyeste endring vinner. Slettinger følger med som gravsteiner. Har du endret en oppgave etter at den ble slettet et annet sted, blir den stående.</div>
    <div class="danger">
      <div class="dh">${svg('warn')} Faresone</div>
      <div class="ds">Kan ikke angres. Ta gjerne en eksport først.</div>
      <button class="dbtn warn" data-purge="1">${svg('check')}<span>Fjern fullførte oppgaver</span></button>
      <button class="dbtn del" data-wipe="1">${svg('trash')}<span>Slett alle data</span></button>
    </div>
  `,`<button class="btn pri" id="syncClose">Lukk</button>`);
  document.getElementById('syncClose').onclick=()=>{sheetClose();tab='hjem';render();};
  const sf=document.getElementById('syncFile');
  sf.onchange=()=>{const f=sf.files&&sf.files[0];if(f){const r=new FileReader();r.onload=()=>todoSyncApply(String(r.result||''));r.readAsText(f);}sf.value='';};
  const rf=document.getElementById('replaceFile');
  if(rf)rf.onchange=()=>{const f=rf.files&&rf.files[0];if(f){if(confirm('Erstatte ALT med denne fila?\n\nAlt som ligger i appen nå slettes og byttes ut med innholdet i fila. Ta gjerne en eksport først.')){const r=new FileReader();r.onload=()=>todoSyncReplace(String(r.result||''));r.readAsText(f);}}rf.value='';};
  document.getElementById('shBody').onclick=e=>{
    const b=e.target.closest('[data-exp]');
    if(b){todoSyncExport(b.dataset.exp==='1');return;}
    if(e.target.closest('[data-purge]')){purgeDone();return;}
    if(e.target.closest('[data-wipe]')){wipeAll();return;}
  };
}

let tab='hjem', clockT=null, _agScroll=true;
function greetWord(){const h=new Date().getHours();return h<12?'God morgen':(h<18?'God ettermiddag':'God kveld');}
function clockHm(){const d=new Date(),p=n=>String(n).padStart(2,'0');return p(d.getHours())+':'+p(d.getMinutes());}
function clockDate(){return new Date().toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function startClock(){
  if(clockT)clearInterval(clockT);
  clockT=setInterval(()=>{
    const hm=document.getElementById('clkHm');if(hm)hm.textContent=clockHm();
    const g=document.getElementById('greetTxt');if(g)g.textContent=greetWord()+(db.meta.name?', '+db.meta.name:'');
  },15000);
}

function wireAbcSheetDrag(list){
  list.querySelectorAll('.grip').forEach(grip=>{
    grip.style.touchAction='none';
    grip.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();});
    grip.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return;
      e.preventDefault();e.stopPropagation();
      const dragEl=grip.closest('.catrow');if(!dragEl)return;
      dragEl.classList.add('dragging');document.body.classList.add('dragging-active');
      const move=ev=>{
        const rows=[...list.querySelectorAll('.catrow:not(.dragging)')];
        const y=ev.clientY;let ref=null;
        for(const r of rows){const bb=r.getBoundingClientRect();if(y<bb.top+bb.height/2){ref=r;break;}}
        if(ref)list.insertBefore(dragEl,ref);else list.appendChild(dragEl);
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);
        document.removeEventListener('pointerup',up);
        document.removeEventListener('pointercancel',up);
        document.body.classList.remove('dragging-active');
        dragEl.classList.remove('dragging');
        const ids=[...list.querySelectorAll('.catrow')].map(r=>r.dataset.id);
        db.abcCats=ids.map(id=>abcCats().find(c=>c[0]===id)).filter(Boolean);
        save();render();renderAbcSheet();
      };
      document.addEventListener('pointermove',move);
      document.addEventListener('pointerup',up);
      document.addEventListener('pointercancel',up);
    });
  });
}

function commitManual(container){
  const now=Date.now();
  const vis=[];
  [...container.children].forEach(el=>{
    if(!el.classList)return;
    if(el.classList.contains('card')&&el.dataset.id)vis.push('t:'+el.dataset.id);
    else if(el.classList.contains('divrow')&&el.dataset.divid)vis.push('d:'+el.dataset.divid);
  });

  const seq=[...db.todos.map(t=>({k:'t',id:t.id,o:(t.ord==null?1e9:t.ord),cr:t.created||0,ref:t})),
             ...todoDividers().map(d=>({k:'d',id:d.id,o:(d.ord==null?1e9:d.ord),cr:d.mtime||0,ref:d}))]
    .sort((a,b)=>(a.o-b.o)||(a.cr-b.cr));
  const byKey=new Map(seq.map(it=>[it.k+':'+it.id,it]));
  let vi=0;
  const newSeq=seq.map(it=>{
    const key=it.k+':'+it.id;
    if(visSet.has(key)){
      while(vi<vis.length&&!byKey.has(vis[vi]))vi++;
      const rep=vi<vis.length?byKey.get(vis[vi++]):it;
      return rep||it;
    }
    return it;
  });
  let n=0;
  newSeq.forEach(it=>{
    if(it.ref.ord!==n){it.ref.ord=n;if(it.k==='t')it.ref.updated=now;else it.ref.mtime=now;}
    n++;
  });
  db.todos.forEach(t=>{if(t.ord==null)t.ord=n++;});
  save();render();
}

function wireBoardDrag(board){
  if(!board)return;
  board.querySelectorAll('.kcard').forEach(card=>{
    card.style.touchAction='none';
    card.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return;
      const id=card.dataset.id;const sx=e.clientX,sy=e.clientY;let dragging=false;
      const move=ev=>{
        if(!dragging){
          if(Math.abs(ev.clientX-sx)<7&&Math.abs(ev.clientY-sy)<7)return;
          dragging=true;card.classList.add('kdrag');document.body.classList.add('dragging-active');
        }
        ev.preventDefault();
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        const col=el&&el.closest('.kcol');if(!col)return;
        const kb=col.querySelector('.kbody');if(!kb)return;
        const cards=[...kb.querySelectorAll('.kcard:not(.kdrag)')];
        let ref=null;
        for(const c of cards){const r=c.getBoundingClientRect();if(ev.clientY<r.top+r.height/2){ref=c;break;}}
        const em=kb.querySelector('.kempty');if(em)em.remove();
        if(ref)kb.insertBefore(card,ref);else kb.appendChild(card);
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);document.removeEventListener('pointercancel',up);
        document.body.classList.remove('dragging-active');
        if(dragging){card.classList.remove('kdrag');commitBoard(board);}
        else{todoSheet(id);}
      };
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);document.addEventListener('pointercancel',up);
    });
  });
}

function wireKolDrag(container){

      const move=ev=>{

function abcGroupPop(k){
  const m=abcCats().find(c=>c[0]===k);if(!m)return;
  const cid0=abcCats()[0][0];
  const items=(db.todos||[]).filter(t=>!t.done&&(t.prio||cid0)===k).sort((a,b)=>((a.ord==null?1e9:a.ord)-(b.ord==null?1e9:b.ord))||((a.created||0)-(b.created||0)));
  const old=document.getElementById('abcPopOv');if(old)old.remove();
  const ov=document.createElement('div');ov.id='abcPopOv';ov.className='abcpop-ov';
  ov.innerHTML=`<div class="abcpop"><div class="abcpop-h" style="background:${m[2]}"><span class="bb">${esc(m[0])}</span><span>${esc(m[1])}</span><span class="c">${items.length}</span><button type="button" class="x" data-abcpopx>${svg('close')}</button></div><div class="abcpop-b">${items.length?items.map(t=>`<div class="abcpop-row" data-abcpopopen="${t.id}"><span class="abcchk"></span><span class="n">${esc(t.title||'')}</span></div>`).join(''):`<div class="abcempty" style="padding:10px">Ingen oppgaver her.</div>`}</div></div>`;
  ov.addEventListener('click',e=>{
    if(e.target===ov||e.target.closest('[data-abcpopx]')){ov.remove();return;}
    const r=e.target.closest('[data-abcpopopen]');
    if(r){ov.remove();todoSheet(r.dataset.abcpopopen);}
  });
  document.body.appendChild(ov);
}
function wireAbcTab(v){
  v.querySelectorAll('[data-abcpop]').forEach(b=>b.addEventListener('click',()=>abcGroupPop(b.dataset.abcpop)));
  v.querySelectorAll('[data-abcgtoggle]').forEach(h=>h.addEventListener('click',()=>{
    const k=h.dataset.abcgtoggle;
    const set=new Set(Array.isArray(db.meta.abcClosed)?db.meta.abcClosed:[]);
    set.has(k)?set.delete(k):set.add(k);
    db.meta.abcClosed=[...set];save();render();
  }));
  const all=v.querySelector('[data-abcgall]');
  if(all)all.addEventListener('click',()=>{
    const set=new Set(Array.isArray(db.meta.abcClosed)?db.meta.abcClosed:[]);
    db.meta.abcClosed=set.size?[]:abcCats().map(c=>c[0]);
    save();render();
  });
  v.querySelectorAll('.abcgrip').forEach(grip=>{
    grip.style.touchAction='none';
    grip.addEventListener('click',e=>{e.stopPropagation();e.preventDefault();});
    grip.addEventListener('pointerdown',e=>{
      if(e.button!=null&&e.button>0)return;
      e.preventDefault();e.stopPropagation();
      const dragEl=grip.closest('.abcrow');if(!dragEl)return;
      dragEl.classList.add('dragging');document.body.classList.add('dragging-active');
      const move=ev=>{
        const el=document.elementFromPoint(ev.clientX,ev.clientY);
        const body=el&&el.closest?el.closest('.abcg-b'):null;
        if(!body)return;
        const rows=[...body.querySelectorAll('.abcrow:not(.dragging)')];
        let ref=null;for(const r of rows){const b=r.getBoundingClientRect();if(ev.clientY<b.top+b.height/2){ref=r;break;}}
        if(ref)body.insertBefore(dragEl,ref);else body.appendChild(dragEl);
      };
      const up=()=>{
        document.removeEventListener('pointermove',move);
        document.removeEventListener('pointerup',up);
        document.removeEventListener('pointercancel',up);
        document.body.classList.remove('dragging-active');
        dragEl.classList.remove('dragging');
        const body=dragEl.closest('.abcg-b');
        const k=body?body.dataset.cat:null;
        const t=(db.todos||[]).find(x=>x.id===dragEl.dataset.abcid);
        if(t&&k){
          if((t.prio||abcCats()[0][0])!==k)t.prio=k;
          let n=0;const now=Date.now();
          v.querySelectorAll('.abcg-b').forEach(b2=>{
            b2.querySelectorAll('.abcrow').forEach(r=>{
              const tt=(db.todos||[]).find(x=>x.id===r.dataset.abcid);
              if(tt){tt.ord=n++;tt.updated=now;}
            });
          });
          if(getAbcSortOn())abcSortWithDividers(true);
          save();
        }
        render();
      };
      document.addEventListener('pointermove',move);
      document.addEventListener('pointerup',up);
      document.addEventListener('pointercancel',up);
    });
  });
}
